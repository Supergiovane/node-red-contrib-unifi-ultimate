    </text>
    <text x="2" y="100" fill="#bae6fd" font-family="'Avenir Next', 'Segoe UI', Roboto, Arial, sans-serif" font-size="24" font-weight="500">
      Simple. Clean. Ready for Node-RED.
    </text>
