<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" role="img" aria-labelledby="title desc">
  <title id="title">UniFi Ultimate</title>
  <desc id="desc">Tech style logo with minimal text for node-red-contrib-unifi-ultimate.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071426"/>
      <stop offset="100%" stop-color="#112a46"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glowSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#38bdf8" flood-opacity="0.5"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="12" y="12" width="936" height="256" rx="34" fill="url(#bg)"/>

  <g stroke="#4cc9f0" stroke-opacity="0.35" stroke-width="1.6" fill="none">
    <path d="M18 64H244"/>
    <path d="M18 216H230"/>
    <path d="M714 64H942"/>
    <path d="M730 216H942"/>
  </g>

  <g transform="translate(40 40)" filter="url(#shadow)">
    <rect x="0" y="0" width="200" height="200" rx="42" fill="#0a1f36" stroke="#2d4f73"/>
    <rect x="20" y="20" width="160" height="160" rx="32" fill="url(#chip)"/>

    <g transform="translate(24 22)" filter="url(#glowSoft)">
      <circle cx="80" cy="80" r="56" fill="none" stroke="url(#glow)" stroke-width="2.5" opacity="0.7"/>
      <g transform="translate(16 14) scale(0.66)">
        <path d="M96 0h18v18H96z" fill="#e0f2fe"/>
        <path d="M76 54h20v20H76z" fill="#e0f2fe"/>
        <path d="M56 71v25c0 22.091 17.909 40 40 40s40-17.909 40-40V54h-20v42c0 11.046-8.954 20-20 20s-20-8.954-20-20V71z" fill="#e0f2fe"/>
        <path d="M16 54h20v42c0 33.137 26.863 60 60 60s60-26.863 60-60V54h20v42c0 20.628-4.676 35.684-12.42 48.133-3.572 5.742-7.84 11.006-12.664 15.766-14.896 14.688-34.824 24.101-54.916 26.114-3.021.303-9.044.606-12 .606-2.956 0-8.979-.303-12-.606-20.092-2.013-40.02-11.426-54.916-26.114-4.824-4.76-9.092-10.024-12.664-15.766C20.676 131.684 16 116.628 16 96z" fill="#e0f2fe" opacity="0.24"/>
      </g>
    </g>
  </g>

  <g transform="translate(286 76)">
    <text x="0" y="56" fill="#eff6ff" font-family="'Avenir Next', 'Segoe UI', Roboto, Arial, sans-serif" font-size="58" font-weight="700" letter-spacing="0.2">
