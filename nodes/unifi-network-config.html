<link rel="stylesheet" type="text/css" href="resources/node-red-contrib-unifi-ultimate/editor/unifi-ultimate-editor-common.css">


<script type="text/javascript">
    RED.nodes.registerType("unifi-network-config", {
        category: "config",
        defaults: {
            name: { value: "Unifi Network Config" },
            host: { value: "", required: true },
            port: {
                value: "",
                required: false,
                validate: function (value) {
                    if (value === undefined || value === null || value === "") {
                        return true;
                    }
                    return /^\d+$/.test(String(value)) && Number(value) >= 1 && Number(value) <= 65535;
                }
            },
            rejectUnauthorized: { value: false },
            powerObservationIntervalSeconds: {
                value: 15,
                required: false,
                validate: function (value) {
                    return value === undefined
                        || value === null
                        || value === ""
                        || RED.validators.number()(value);
                }
            }
        },
        credentials: {
            apiKey: { type: "password", required: true }
        },
        label: function () {
            return this.name || this.host || "Unifi Network Config";
        },
        oneditprepare: function () {
            const node = this;
            const $hostInput = $("#node-config-input-host");
            const $port = $("#node-config-input-port");
            const $apiKey = $("#node-config-input-apiKey");
            const $allowSelfSigned = $("#node-config-input-allowSelfSigned");
            const $powerObservationIntervalSeconds = $("#node-config-input-powerObservationIntervalSeconds");
            const $portRow = $port.closest(".form-row");
            const $apiKeyRow = $apiKey.closest(".form-row");
            const $securityRow = $allowSelfSigned.closest(".form-row");
            const $powerObservationRow = $powerObservationIntervalSeconds.closest(".form-row");
            const $advancedRow = $("#node-config-row-advanced");

            // The stored field is rejectUnauthorized, but the checkbox is shown as
            // its inverse ("Allow self-signed certificate") because UniFi
            // controllers almost always use self-signed certificates. Default to
            // allowing them when no explicit strict value was saved.
            $allowSelfSigned.prop("checked", node.rejectUnauthorized !== true && node.rejectUnauthorized !== "true");

            function syncProgressiveRows() {
                const hasHost = String($hostInput.val() || node.host || "").trim() !== "";
                $portRow.toggle(hasHost);
                $apiKeyRow.toggle(hasHost);
                $securityRow.toggle(hasHost);
                $powerObservationRow.toggle(hasHost);
                $advancedRow.toggle(hasHost);
            }

            try {
                // Keep the node help visible while configuring the connection so
                // first-time users can see the authentication guidance.
                RED.sidebar.show("help");
            } catch (error) {
            }

            syncProgressiveRows();
            $hostInput.on("change input", function () {
                syncProgressiveRows();
            });
        },
        oneditsave: function () {
            // Persist the inverse of the "Allow self-signed certificate" checkbox.
            this.rejectUnauthorized = !$("#node-config-input-allowSelfSigned").prop("checked");
        }
    });
</script>

    </div>
    <div class="form-row unifi-ultimate-hero">
        <a class="unifi-ultimate-youtube-link" href="https://www.youtube.com/watch?v=ZOq7M5mgUBk&list=PL9Yh1bjbLAYrWKtMlopN0swuQXbdJ8MFJ" target="_blank" rel="noopener noreferrer">
            <img src="resources/node-red-contrib-unifi-ultimate/logos/youtube-icon.svg" alt="YouTube" width="24" height="18">
            <span>Youtube Tutorials</span>

    <div class="form-row">

            <input type="text" id="node-config-input-name" placeholder="Node name">

<script type="text/html" data-help-name="unifi-network-config">
    <p><a href="https://www.youtube.com/watch?v=ZOq7M5mgUBk&list=PL9Yh1bjbLAYrWKtMlopN0swuQXbdJ8MFJ" target="_blank" rel="noopener noreferrer"><img src="resources/node-red-contrib-unifi-ultimate/logos/youtube-icon.svg" alt="YouTube" width="24" height="18" style="vertical-align:text-bottom; margin-right:6px;">Youtube Tutorials</a></p>

    <p>Shared connection for UniFi Network nodes.</p>

    <h3>Configuration</h3>
    <p><b>Controller</b> accepts the UniFi OS host or IP address. The node builds the local UniFi Network proxy URL automatically.</p>
    <p><b>Port</b> is optional. Leave it empty to use the default <code>443</code>. Set it when your UniFi OS server listens on a custom port (for example <code>11443</code>). A port embedded directly in the Controller field (<code>host:port</code>) takes precedence over this field.</p>
    <p><b>API Key</b> is required for authentication and is sent as <code>X-API-Key</code>.</p>
    <p><b>Security</b> &mdash; <b>Allow self-signed certificate</b> is enabled by default because UniFi controllers almost always present a self-signed certificate. Leave it checked for UniFi OS / UXG setups. Uncheck it only if your controller serves a certificate signed by a trusted certificate authority and you want strict verification.</p>
    <p><b>Power Poll (s)</b> is the global polling interval used by all <code>Control POE</code> nodes when action is <code>Emit Power Consumption</code>. It is optional and defaults to 15 seconds.</p>
    <p><b>Name</b> is the config node name shown in the editor.</p>

    <h3>Usage</h3>
    <p>This config node is used by Network Device, Network Presence, and Control POE nodes.</p>
    <p>All UniFi Network requests are executed by this config node. Runtime nodes subscribe through <code>addClient/removeClient</code> and receive updates/events from here.</p>
    <p>Event streams and observation timers are centralized here (shared scheduler per config node), so runtime nodes do not open their own websocket channels or polling timers.</p>
    <p>The node uses the official Network integration API where available and falls back automatically to local legacy endpoints when the official <code>/v1</code> routes are not exposed (for example on older local releases). For switch port/client mapping and PoE enable/disable, legacy endpoints are also used where needed.</p>
</script>
