<script type="text/javascript">
    RED.nodes.registerType("unifi-network-config", {
        category: "config",
        defaults: {
            name: { value: "Unifi Network Config" },
            host: { value: "", required: true },
            rejectUnauthorized: { value: false }
        },
        credentials: {
            apiKey: { type: "password", required: true }
        },
        label: function () {
            return this.name || this.host || "Unifi Network Config";
        },
        oneditprepare: function () {
            const $host = $("#node-config-input-host");
            const $connectionHint = $("#node-config-input-connectionHint");

            function escapeHtml(value) {
                // The preview is rendered as HTML, so sanitize user input before
                // echoing the controller host back into the hint box.
                return String(value || "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/\"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            function refreshConnectionHint() {
                const host = String($host.val() || "").trim();
                if (!host) {
                    $connectionHint.html("<strong>Enter your controller address</strong>The node builds the UniFi Network connection automatically.");
                    return;
                }

                // The runtime accepts either a bare host or a full URL, but the
                // preview intentionally shows the normalized integration endpoint.
                const normalizedHost = host.replace(/^https?:\/\//i, "").replace(/\/+$/, "");
                $connectionHint.html(
                    "<strong>Connection preview</strong>Will connect to <code>https://" +
                    escapeHtml(normalizedHost) +
                    "/proxy/network/integration</code>"
                );
            }

            try {
                // Keep the node help visible while configuring the connection so
                // first-time users can see the authentication guidance.
                RED.sidebar.show("help");
            } catch (error) {
            }

            refreshConnectionHint();
            $host.on("change input", function () {
                // Update the preview live as the user edits the controller host.
                refreshConnectionHint();
            });
        }
    });
</script>

<script type="text/html" data-template-name="unifi-network-config">
    <div class="form-row unifi-ultimate-hero">
        <div class="unifi-ultimate-hero-panel">
            <div class="unifi-ultimate-eyebrow">UniFi Network Connection</div>
            <strong>Connect Node-RED to your UniFi Network application.</strong>
            <span>Use a local UniFi OS host or IP address and a Network API key.</span>
        </div>
    </div>
    <div class="unifi-ultimate-section-title">Connection</div>
    <div class="form-row">
        <label for="node-config-input-host"><i class="fa fa-globe"></i> Controller</label>
        <input type="text" id="node-config-input-host" placeholder="192.168.1.10">
    </div>
    <div class="form-row">
        <label for="node-config-input-apiKey"><i class="fa fa-key"></i> API Key</label>
        <input type="password" id="node-config-input-apiKey" placeholder="Paste your UniFi Network API key">
    </div>
    <div class="form-row">
        <label for="node-config-input-rejectUnauthorized"><i class="fa fa-lock"></i> Security</label>
        <input type="checkbox" id="node-config-input-rejectUnauthorized" style="display:inline-block; width:auto; vertical-align:top;">
        <span style="margin-left:8px;">Secure connection only</span>
    </div>
    <div class="form-row">
        <div id="node-config-input-connectionHint" class="unifi-ultimate-card"></div>
    </div>
    <div id="node-config-row-advanced" class="unifi-ultimate-advanced">
        <div class="form-row">
            <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
            <input type="text" id="node-config-input-name" placeholder="Node name">
        </div>
    </div>
</script>

<script type="text/html" data-help-name="unifi-network-config">
    <p>Shared connection for UniFi Network nodes.</p>

    <h3>Configuration</h3>
    <p><b>Controller</b> accepts the UniFi OS host or IP address. The node builds the local UniFi Network proxy URL automatically.</p>
    <p><b>API Key</b> is required for authentication and is sent as <code>X-API-Key</code>.</p>
    <p><b>Security</b> controls certificate verification. Disable it only when your controller uses a self-signed certificate.</p>
    <p><b>Name</b> is the config node name shown in the editor.</p>

    <h3>Usage</h3>
    <p>This config node is used by Network Device, Network Presence, and Control POE nodes.</p>
    <p>The node uses the official Network integration API where available. For switch port/client mapping and PoE enable/disable, it also uses the local Network legacy API endpoints exposed through the UniFi OS proxy.</p>
</script>
