<link rel="stylesheet" type="text/css"
    href="resources/node-red-contrib-unifi-ultimate/editor/unifi-ultimate-editor-common.css">

<script type="text/javascript">
    RED.nodes.registerType("unifi-access-config", {
        category: "config",
        defaults: {
            name: { value: "Unifi Access Config" },
            host: { value: "", required: true },
            port: {
                value: "",
                required: false,
                validate: function (value) {
                    if (value === undefined || value === null || value === "") {
                        return true;
                    }
                    return /^\d+$/.test(String(value)) && Number(value) >= 1 && Number(value) <= 65535;
                }
            },
            rejectUnauthorized: { value: false }
        },
        credentials: {
            apiToken: { type: "password", required: true }
        },
        label: function () {
            return this.name || this.host || "Unifi Access Config";
        },
        oneditprepare: function () {
            const node = this;
            const $hostInput = $("#node-config-input-host");
            const $port = $("#node-config-input-port");
            const $apiToken = $("#node-config-input-apiToken");
            const $allowSelfSigned = $("#node-config-input-allowSelfSigned");
            const $portRow = $port.closest(".form-row");
            const $apiTokenRow = $apiToken.closest(".form-row");
            const $securityRow = $allowSelfSigned.closest(".form-row");
            const $advancedRow = $("#node-config-row-advanced");

            // The stored field is rejectUnauthorized, but the checkbox is shown as
            // its inverse ("Allow self-signed certificate") because UniFi
            // controllers almost always use self-signed certificates. Default to
            // allowing them when no explicit strict value was saved.
            $allowSelfSigned.prop("checked", node.rejectUnauthorized !== true && node.rejectUnauthorized !== "true");

            function syncProgressiveRows() {
                const hasHost = String($hostInput.val() || node.host || "").trim() !== "";
                $portRow.toggle(hasHost);
                $apiTokenRow.toggle(hasHost);
                $securityRow.toggle(hasHost);
                $advancedRow.toggle(hasHost);
            }

            try {
                // Open the help panel automatically so token/port notes are
                // visible while the user configures the connection.
                RED.sidebar.show("help");
            } catch (error) {
            }

            syncProgressiveRows();

            $hostInput.on("change input", function () {
                syncProgressiveRows();
            });
        },
        oneditsave: function () {
            // Persist the inverse of the "Allow self-signed certificate" checkbox.
            this.rejectUnauthorized = !$("#node-config-input-allowSelfSigned").prop("checked");
        }
    });
</script>

<script type="text/html" data-template-name="unifi-access-config">
    <div class="form-row unifi-ultimate-product-logo-row">
        <img class="unifi-ultimate-product-logo" src="resources/node-red-contrib-unifi-ultimate/logos/unifi-access-black.svg" alt="UniFi Access logo" onerror="this.closest('.unifi-ultimate-product-logo-row').style.display='none';">
    </div>
    <div class="form-row unifi-ultimate-hero">
        <a class="unifi-ultimate-youtube-link" href="https://youtube.com/playlist?list=PL9Yh1bjbLAYrWKtMlopN0swuQXbdJ8MFJ&si=4MmW1nNTCLrJtEHv" target="_blank" rel="noopener noreferrer">
            <img src="resources/node-red-contrib-unifi-ultimate/logos/youtube-icon.svg" alt="YouTube" width="24" height="18">
            <span>Youtube Tutorials</span>
        </a>
    </div>
    <div class="form-row">
        <label for="node-config-input-host"><i class="fa fa-globe"></i> Controller</label>
        <input type="text" id="node-config-input-host" placeholder="192.168.1.10 or access.local:12445">
    </div>
    <div class="form-row">
        <label for="node-config-input-port"><i class="fa fa-plug"></i> Port</label>
        <input type="text" id="node-config-input-port" placeholder="12445 (default)">
    </div>
    <div class="form-row">
        <label for="node-config-input-apiToken"><i class="fa fa-key"></i> API Token</label>
        <input type="password" id="node-config-input-apiToken" placeholder="Paste your UniFi Access token">
    </div>
    <div class="form-row">
        <label for="node-config-input-allowSelfSigned"><i class="fa fa-lock"></i> Security</label>
        <input type="checkbox" id="node-config-input-allowSelfSigned" style="display:inline-block; width:auto; vertical-align:top;">
        <span style="margin-left:8px;">Allow self-signed certificate</span>
    </div>
    <div id="node-config-row-advanced" class="unifi-ultimate-advanced">
        <div class="form-row">
            <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
            <input type="text" id="node-config-input-name" placeholder="Node name">
        </div>
    </div>
</script>

<script type="text/html" data-help-name="unifi-access-config">
    <p><a href="https://youtube.com/playlist?list=PL9Yh1bjbLAYrWKtMlopN0swuQXbdJ8MFJ&si=4MmW1nNTCLrJtEHv" target="_blank" rel="noopener noreferrer"><img src="resources/node-red-contrib-unifi-ultimate/logos/youtube-icon.svg" alt="YouTube" width="24" height="18" style="vertical-align:text-bottom; margin-right:6px;">Youtube Tutorials</a></p>

    <p>Shared connection for UniFi Access nodes.</p>

    <h3>Configuration</h3>
    <p><b>Controller</b> accepts the UniFi Access host or <code>host:port</code>. If you omit the port, the node uses the default UniFi Access port automatically.</p>
    <p><b>Port</b> is optional. Leave it empty to use the default <code>12445</code>. Set it when your UniFi Access controller listens on a custom port. A port embedded directly in the Controller field (<code>host:port</code>) takes precedence over this field.</p>
    <p><b>API Token</b> is the bearer token used for authentication.</p>
    <p><b>Security</b> &mdash; <b>Allow self-signed certificate</b> is enabled by default because UniFi controllers almost always present a self-signed certificate. Leave it checked for UniFi Access setups. Uncheck it only if your controller serves a certificate signed by a trusted certificate authority and you want strict verification.</p>
    <p><b>Name</b> is the config node name shown in the editor.</p>

    <h3>Usage</h3>
    <p>This config node is used by UniFi Access Device nodes for API requests and live notification events.</p>
    <p>All Access API calls and notification channels are managed by this config node. Runtime nodes subscribe through <code>addClient/removeClient</code> and receive fan-out updates.</p>
</script>
