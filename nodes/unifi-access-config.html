<link rel="stylesheet" type="text/css" href="resources/node-red-contrib-unifi-ultimate/editor/unifi-ultimate-editor-common.css">

<script type="text/javascript">
    RED.nodes.registerType("unifi-access-config", {
        category: "config",
        defaults: {
            name: { value: "Unifi Access Config" },
            host: { value: "", required: true },
            rejectUnauthorized: { value: false }
        },
        credentials: {
            apiToken: { type: "password", required: true }
        },
        label: function () {
            return this.name || this.host || "Unifi Access Config";
        },
        oneditprepare: function () {
            const $host = $("#node-config-input-host");
            const $connectionHint = $("#node-config-input-connectionHint");

            function escapeHtml(value) {
                // The connection preview is rendered as HTML, so sanitize any
                // host text typed by the user first.
                return String(value || "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            function refreshConnectionHint() {
                const host = String($host.val() || "").trim();
                if (!host) {
                    $connectionHint.html("<strong>Enter your controller address</strong>The node uses the standard UniFi Access API connection automatically.");
                    return;
                }

                // UniFi Access defaults to port 12445. Show the fully resolved
                // host in the preview even when the user omitted the port.
                const normalizedHost = host.replace(/^https?:\/\//i, "").replace(/\/+$/, "");
                const hasPort = /:\d+$/.test(normalizedHost);
                const previewHost = hasPort ? normalizedHost : normalizedHost + ":12445";
                $connectionHint.html(
                    "<strong>Connection preview</strong>Will connect to <code>https://" +
                    escapeHtml(previewHost) +
                    "</code>"
                );
            }

            try {
                // Open the help panel automatically so token/port notes are
                // visible while the user configures the connection.
                RED.sidebar.show("help");
            } catch (error) {
            }

            refreshConnectionHint();

            $host.on("change input", function () {
                // Keep the preview synchronized with the current host value.
                refreshConnectionHint();
            });
        }
    });
</script>

<script type="text/html" data-template-name="unifi-access-config">
    <div class="form-row unifi-ultimate-product-logo-row">
        <img class="unifi-ultimate-product-logo" src="resources/node-red-contrib-unifi-ultimate/logos/unifi-access-black.svg" alt="UniFi Access logo" onerror="this.closest('.unifi-ultimate-product-logo-row').style.display='none';">
    </div>
    <div class="form-row unifi-ultimate-hero">
        <div class="unifi-ultimate-hero-panel">
            <strong>Connect Node-RED to your UniFi Access application.</strong>
            <span>Use the Access host or IP address and an Access API token.</span>
        </div>
    </div>
    <div class="unifi-ultimate-section-title">Connection</div>
    <div class="form-row">
        <label for="node-config-input-host"><i class="fa fa-globe"></i> Controller</label>
        <input type="text" id="node-config-input-host" placeholder="192.168.1.10 or access.local:12445">
    </div>
    <div class="form-row">
        <label for="node-config-input-apiToken"><i class="fa fa-key"></i> API Token</label>
        <input type="password" id="node-config-input-apiToken" placeholder="Paste your UniFi Access token">
    </div>
    <div class="form-row">
        <label for="node-config-input-rejectUnauthorized"><i class="fa fa-lock"></i> Security</label>
        <input type="checkbox" id="node-config-input-rejectUnauthorized" style="display:inline-block; width:auto; vertical-align:top;">
        <span style="margin-left:8px;">Secure connection only</span>
    </div>
    <div class="form-row">
        <div id="node-config-input-connectionHint" class="unifi-ultimate-card"></div>
    </div>
    <div id="node-config-row-advanced" class="unifi-ultimate-advanced">
        <div class="form-row">
            <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
            <input type="text" id="node-config-input-name" placeholder="Node name">
        </div>
    </div>
</script>

<script type="text/html" data-help-name="unifi-access-config">
    <p>Shared connection for UniFi Access nodes.</p>

    <h3>Configuration</h3>
    <p><b>Controller</b> accepts the UniFi Access host or <code>host:port</code>. If you omit the port, the node uses the default UniFi Access port automatically.</p>
    <p><b>API Token</b> is the bearer token used for authentication.</p>
    <p><b>Security</b> controls certificate verification. Disable it only when your controller uses a self-signed certificate.</p>
    <p><b>Name</b> is the config node name shown in the editor.</p>

    <h3>Usage</h3>
    <p>This config node is used by UniFi Access Device nodes for API requests and live notification events.</p>
    <p>All Access API calls and notification channels are managed by this config node. Runtime nodes subscribe through <code>addClient/removeClient</code> and receive fan-out updates.</p>
</script>
