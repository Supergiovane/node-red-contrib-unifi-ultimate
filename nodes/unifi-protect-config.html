<style>
    .unifi-ultimate-card {
        margin-left: 150px;
        padding: 12px 14px;
        border-radius: 12px;
        background: #f5f7fa;
        color: #334155;
        line-height: 1.45;
    }

    .unifi-ultimate-card strong {
        display: block;
        margin-bottom: 4px;
        color: #0f172a;
        font-weight: 600;
    }

    .unifi-ultimate-advanced {
        margin-top: 4px;
        padding-top: 4px;
        border-top: 1px solid #e5e7eb;
    }

</style>

<script type="text/javascript">
    RED.nodes.registerType("unifi-protect-config", {
        category: "config",
        defaults: {
            name: { value: "Unifi Protect Config" },
            host: { value: "", required: true },
            authHeader: { value: "X-API-Key", required: true },
            rejectUnauthorized: { value: false }
        },
        credentials: {
            apiKey: { type: "password", required: true }
        },
        label: function () {
            return this.name || this.host || "Unifi Protect Config";
        },
        oneditprepare: function () {
            const $host = $("#node-config-input-host");
            const $connectionHint = $("#node-config-input-connectionHint");

            function escapeHtml(value) {
                // The preview is injected as HTML, so sanitize user-controlled
                // host values before displaying them in the summary card.
                return String(value || "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            function refreshConnectionHint() {
                const host = String($host.val() || "").trim();
                if (!host) {
                    $connectionHint.html("<strong>Enter your controller address</strong>The node builds the Protect connection automatically.");
                    return;
                }

                // The runtime normalizes the host and then appends the Protect
                // integration proxy path. Mirror that behavior in the preview.
                const normalizedHost = host.replace(/^https?:\/\//i, "").replace(/\/+$/, "");
                $connectionHint.html(
                    "<strong>Connection preview</strong>Will connect to <code>https://" +
                    escapeHtml(normalizedHost) +
                    "/proxy/protect/integration</code>"
                );
            }

            try {
                // Show the help sidebar immediately so the API header guidance is
                // visible while the user configures the node.
                RED.sidebar.show("help");
            } catch (error) {
            }

            refreshConnectionHint();

            $host.on("change input", function () {
                // Refresh the preview in real time when the controller changes.
                refreshConnectionHint();
            });

        }
    });
</script>

<script type="text/html" data-template-name="unifi-protect-config">
    <div class="form-row">
        <label for="node-config-input-host"><i class="fa fa-globe"></i> Controller</label>
        <input type="text" id="node-config-input-host" placeholder="192.168.1.10">
    </div>
    <div class="form-row">
        <label for="node-config-input-apiKey"><i class="fa fa-key"></i> API Key</label>
        <input type="password" id="node-config-input-apiKey" placeholder="Paste your UniFi Protect API key">
    </div>
    <div class="form-row">
        <label for="node-config-input-rejectUnauthorized"><i class="fa fa-lock"></i> Security</label>
        <input type="checkbox" id="node-config-input-rejectUnauthorized" style="display:inline-block; width:auto; vertical-align:top;">
        <span style="margin-left:8px;">Secure connection only</span>
    </div>
    <div class="form-row">
        <div id="node-config-input-connectionHint" class="unifi-ultimate-card"></div>
    </div>
    <div id="node-config-row-advanced" class="unifi-ultimate-advanced">
        <div class="form-row">
            <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
            <input type="text" id="node-config-input-name" placeholder="Node name">
        </div>
        <div class="form-row">
            <label for="node-config-input-authHeader"><i class="fa fa-header"></i> API Header</label>
            <input type="text" id="node-config-input-authHeader" placeholder="X-API-Key">
        </div>
    </div>
</script>

<script type="text/html" data-help-name="unifi-protect-config">
    <p>Shared connection for UniFi Protect nodes.</p>

    <h3>Configuration</h3>
    <p><b>Controller</b> accepts the UniFi OS host or IP address. The node builds the Protect integration URL automatically.</p>
    <p><b>API Key</b> is required for authentication.</p>
    <p><b>Security</b> controls certificate verification. Disable it only when your controller uses a self-signed certificate.</p>
    <p><b>Name</b> is the config node name shown in the editor.</p>
    <p><b>API Header</b> is an advanced field. Leave the default value unless your UniFi Protect setup expects a different header name.</p>

    <h3>Usage</h3>
    <p>This config node is used by UniFi Protect Device nodes for API requests and live device/event updates.</p>
</script>
