<link rel="stylesheet" type="text/css"
    href="resources/node-red-contrib-unifi-ultimate/editor/unifi-ultimate-editor-common.css">


<script type="text/javascript">
    RED.nodes.registerType("unifi-protect-config", {
        category: "config",
        defaults: {
            name: { value: "Unifi Protect Config" },
            host: { value: "", required: true },
            port: {
                value: "",
                required: false,
                validate: function (value) {
                    if (value === undefined || value === null || value === "") {
                        return true;
                    }
                    return /^\d+$/.test(String(value)) && Number(value) >= 1 && Number(value) <= 65535;
                }
            },
            authHeader: { value: "X-API-Key", required: true },
            rejectUnauthorized: { value: false }
        },
        credentials: {
            apiKey: { type: "password", required: true }
        },
        label: function () {
            return this.name || this.host || "Unifi Protect Config";
        },
        oneditprepare: function () {
            const node = this;
            const $hostInput = $("#node-config-input-host");
            const $port = $("#node-config-input-port");
            const $apiKey = $("#node-config-input-apiKey");
            const $allowSelfSigned = $("#node-config-input-allowSelfSigned");
            const $portRow = $port.closest(".form-row");
            const $apiKeyRow = $apiKey.closest(".form-row");
            const $securityRow = $allowSelfSigned.closest(".form-row");
            const $advancedRow = $("#node-config-row-advanced");

            // The stored field is rejectUnauthorized, but the checkbox is shown as
            // its inverse ("Allow self-signed certificate") because UniFi
            // controllers almost always use self-signed certificates. Default to
            // allowing them when no explicit strict value was saved.
            $allowSelfSigned.prop("checked", node.rejectUnauthorized !== true && node.rejectUnauthorized !== "true");

            function syncProgressiveRows() {
                const hasHost = String($hostInput.val() || node.host || "").trim() !== "";
                $portRow.toggle(hasHost);
                $apiKeyRow.toggle(hasHost);
                $securityRow.toggle(hasHost);
                $advancedRow.toggle(hasHost);
            }

            try {
                // Show the help sidebar immediately so the API header guidance is
                // visible while the user configures the node.
                RED.sidebar.show("help");
            } catch (error) {
            }

            syncProgressiveRows();

            $hostInput.on("change input", function () {
                syncProgressiveRows();
            });

        },
        oneditsave: function () {
            // Persist the inverse of the "Allow self-signed certificate" checkbox.
            this.rejectUnauthorized = !$("#node-config-input-allowSelfSigned").prop("checked");
        }
    });
</script>

<script type="text/html" data-template-name="unifi-protect-config">
    <div class="form-row unifi-ultimate-product-logo-row">
        <img class="unifi-ultimate-product-logo" src="resources/node-red-contrib-unifi-ultimate/logos/unifi-protect-black.svg" alt="UniFi Protect logo" onerror="this.closest('.unifi-ultimate-product-logo-row').style.display='none';">
    </div>
    <div class="form-row unifi-ultimate-hero">
        <a class="unifi-ultimate-youtube-link" href="https://youtube.com/playlist?list=PL9Yh1bjbLAYrWKtMlopN0swuQXbdJ8MFJ&si=4MmW1nNTCLrJtEHv" target="_blank" rel="noopener noreferrer">
            <img src="resources/node-red-contrib-unifi-ultimate/logos/youtube-icon.svg" alt="YouTube" width="24" height="18">
            <span>Youtube Tutorials</span>
        </a>
    </div>
    <div class="form-row">
        <label for="node-config-input-host"><i class="fa fa-globe"></i> Controller</label>
        <input type="text" id="node-config-input-host" placeholder="192.168.1.10">
    </div>
    <div class="form-row">
        <label for="node-config-input-port"><i class="fa fa-plug"></i> Port</label>
        <input type="text" id="node-config-input-port" placeholder="443 (default)">
    </div>
    <div class="form-row">
        <label for="node-config-input-apiKey"><i class="fa fa-key"></i> API Key</label>
        <input type="password" id="node-config-input-apiKey" placeholder="Paste your UniFi Protect API key">
    </div>
    <div class="form-row">
        <label for="node-config-input-allowSelfSigned"><i class="fa fa-lock"></i> Security</label>
        <input type="checkbox" id="node-config-input-allowSelfSigned" style="display:inline-block; width:auto; vertical-align:top;">
        <span style="margin-left:8px;">Allow self-signed certificate</span>
    </div>
    <div id="node-config-row-advanced" class="unifi-ultimate-advanced">
        <div class="form-row">
            <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
            <input type="text" id="node-config-input-name" placeholder="Node name">
        </div>
        <div class="form-row">
            <label for="node-config-input-authHeader"><i class="fa fa-header"></i> API Header</label>
            <input type="text" id="node-config-input-authHeader" placeholder="X-API-Key">
        </div>
    </div>
</script>

<script type="text/html" data-help-name="unifi-protect-config">
    <p><a href="https://youtube.com/playlist?list=PL9Yh1bjbLAYrWKtMlopN0swuQXbdJ8MFJ&si=4MmW1nNTCLrJtEHv" target="_blank" rel="noopener noreferrer"><img src="resources/node-red-contrib-unifi-ultimate/logos/youtube-icon.svg" alt="YouTube" width="24" height="18" style="vertical-align:text-bottom; margin-right:6px;">Youtube Tutorials</a></p>

    <p>Shared connection for UniFi Protect nodes.</p>

    <h3>Configuration</h3>
    <p><b>Controller</b> accepts the UniFi OS host or IP address. The node builds the Protect integration URL automatically.</p>
    <p><b>Port</b> is optional. Leave it empty to use the default <code>443</code>. Set it when your UniFi OS server listens on a custom port (for example <code>11443</code>). A port embedded directly in the Controller field (<code>host:port</code>) takes precedence over this field.</p>
    <p><b>API Key</b> is required for authentication.</p>
    <p><b>Security</b> &mdash; <b>Allow self-signed certificate</b> is enabled by default because UniFi controllers almost always present a self-signed certificate. Leave it checked for UniFi OS setups. Uncheck it only if your controller serves a certificate signed by a trusted certificate authority and you want strict verification.</p>
    <p><b>Name</b> is the config node name shown in the editor.</p>
    <p><b>API Header</b> is an advanced field. Leave the default value unless your UniFi Protect setup expects a different header name.</p>

    <h3>Usage</h3>
    <p>This config node is used by UniFi Protect Device nodes for API requests and live device/event updates.</p>
    <p>All Protect API calls and websocket streams are managed by this config node. Runtime nodes subscribe through <code>addClient/removeClient</code> and receive broadcast updates.</p>
</script>
