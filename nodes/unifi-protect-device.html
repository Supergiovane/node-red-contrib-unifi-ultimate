<link rel="stylesheet" type="text/css" href="resources/node-red-contrib-unifi-ultimate/editor/unifi-ultimate-editor-common.css">


<script type="text/javascript">
    RED.nodes.registerType("unifi-protect-device", {
        category: "Unifi Ultimate",
        color: "#7DB7E8",
        defaults: {
            name: { value: "" },
            server: { value: "", type: "unifi-protect-config", required: true },
            deviceType: { value: "", required: true },
            deviceId: { value: "", required: true },
            deviceName: { value: "" },
            inputs: { value: 1 },
            capability: { value: "observe", required: true },
            capabilityConfig: { value: "{}" },
            timeout: { value: 15000, required: true, validate: RED.validators.number() }
        },
        inputs: 1,
        outputs: 1,
        icon: "unifi-u-logo-light-protect.svg",
        paletteLabel: "PROTECT",
        outputLabels: ["result"],
        label: function () {
            return this.name || this.deviceId || "Unifi Protect";
        },
        oneditsave: function () {
            const selectedCapabilityId = String($("#node-input-capability").val() || this.capability || "observe").trim();
            const selectedCapabilityOpensStream = $("#node-input-capability option:selected").data("opens-stream") === true
                || $("#node-input-capability option:selected").attr("data-opens-stream") === "true";
            // Hide the input pin only when the selected action starts an event stream.
            this.inputs = (selectedCapabilityOpensStream || selectedCapabilityId === "observe") ? 0 : 1;

            const $capabilityConfig = $("#node-input-capabilityConfig");
            const capabilityConfig = {};
            if ($capabilityConfig.length === 0) {
                this.capabilityConfig = "{}";
                return;
            }

            $("#node-input-capabilityConfigContainer").find("[id^='node-input-capability-config-']").each(function () {
                const $field = $(this);
                const fieldId = String($field.attr("id") || "").replace("node-input-capability-config-", "");
                if (!fieldId) {
                    return;
                }

                if ($field.is(":checkbox")) {
                    capabilityConfig[fieldId] = $field.is(":checked");
                    return;
                }

                if ($field.is("select[multiple]")) {
                    capabilityConfig[fieldId] = $field.val() || [];
                    return;
                }

                capabilityConfig[fieldId] = $field.val();
            });

            const existingValue = String($capabilityConfig.val() || "").trim();
            let parsedExistingValue = {};
            if (existingValue) {
                try {
                    const parsed = JSON.parse(existingValue);
                    parsedExistingValue = parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
                } catch (error) {
                    parsedExistingValue = {};
                }
            }

            this.capabilityConfig = JSON.stringify({
                ...parsedExistingValue,
                ...capabilityConfig
            });
        },
        oneditprepare: function () {
            const node = this;
            const $name = $("#node-input-name");
            const $server = $("#node-input-server");
            const $deviceType = $("#node-input-deviceType");
            const $deviceId = $("#node-input-deviceId");
            const $deviceName = $("#node-input-deviceName");
            const $capability = $("#node-input-capability");
            const $capabilityConfig = $("#node-input-capabilityConfig");
            const $capabilityConfigRow = $("#node-row-capabilityConfig");
            const $capabilityConfigContainer = $("#node-input-capabilityConfigContainer");
            const $refresh = $("#node-input-refreshDevices");
            const $selectionSummary = $("#node-input-selectionSummary");
            const $selectionDetail = $("#node-input-selectionDetail");
            let capabilityConfig = parseCapabilityConfig(node.capabilityConfig);
            let capabilityListRequestId = 0;
            let capabilityOptionsRequestId = 0;
            let suspendChangeHandling = false;
            let isInitializingEditor = true;
            let deviceTypeDefinitions = [];
            let capabilityDefinitions = [];
            function parseCapabilityConfig(rawValue) {
                if (rawValue && typeof rawValue === "object" && !Array.isArray(rawValue)) {
                    return rawValue;
                }

                if (typeof rawValue !== "string" || rawValue.trim() === "") {
                    return {};
                }

                try {
                    const parsed = JSON.parse(rawValue);
                    return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
                } catch (error) {
                    return {};
                }
            }

            function writeCapabilityConfig() {
                $capabilityConfig.val(JSON.stringify(capabilityConfig || {}));
            }

            function withSuppressedChanges(callback) {
                suspendChangeHandling = true;
                try {
                    return callback();
                } finally {
                    suspendChangeHandling = false;
                }
            }

            function getCurrentOrNodeValue($input, nodeValue, fallbackValue) {
                const currentValue = String($input.val() || "").trim();
                if (currentValue !== "") {
                    return currentValue;
                }

                const persistedValue = String(nodeValue || "").trim();
                if (persistedValue !== "") {
                    return persistedValue;
                }

                return String(fallbackValue || "").trim();
            }

            function requestJson(url) {
                return new Promise(function (resolve, reject) {
                    $.getJSON(url, function (data) {
                        resolve(data);
                    }).fail(function (xhr) {
                        reject(xhr);
                    });
                });
            }

            function getConfigNodesByType(configType) {
                const configs = [];
                try {
                    if (RED && RED.nodes) {
                        // Read config nodes directly from the editor registry so
                        // new nodes can immediately bind to an existing connection.
                        if (typeof RED.nodes.eachConfig === "function") {
                            RED.nodes.eachConfig(function (cfg) {
                                if (cfg && cfg.type === configType) {
                                    configs.push(cfg);
                                }
                            });
                        } else if (typeof RED.nodes.eachNode === "function") {
                            RED.nodes.eachNode(function (cfg) {
                                if (cfg && cfg.type === configType) {
                                    configs.push(cfg);
                                }
                            });
                        }

                        if (configs.length === 0 && typeof RED.nodes.filterNodes === "function") {
                            try {
                                const filtered = RED.nodes.filterNodes({ type: configType });
                                if (Array.isArray(filtered)) {
                                    filtered.forEach(function (cfg) {
                                        configs.push(cfg);
                                    });
                                }
                            } catch (error) {
                            }
                        }
                    }
                } catch (error) {
                }
                return configs;
            }

            function ensureDefaultServerSelection() {
                // Auto-select the first available config only for empty nodes.
                // Existing saved nodes must keep their original connection.
                const currentValue = String($server.val() || node.server || "").trim();
                if (currentValue !== "" && currentValue !== "_ADD_") {
                    return;
                }

                const configs = getConfigNodesByType("unifi-protect-config");
                if (!Array.isArray(configs) || configs.length === 0) {
                    return;
                }

                const firstConfigId = String(configs[0].id || "").trim();
                if (!firstConfigId) {
                    return;
                }

                $server.val(firstConfigId);
            }

            function makeSelectSearchable($select, placeholder) {
                if (!$select || $select.length === 0) {
                    return;
                }
                const selectId = String($select.attr("id") || "").trim();
                if (!selectId) {
                    return;
                }

                const searchId = selectId + "-search";
                $select.off(".unifiSearchable");
                $select.removeData("unifi-searchable");
                $select.removeData("unifi-options-count");
                $select.show();

                if ($select.is("select[multiple]")) {
                    return;
                }

                const $existingSearchInput = $("#" + searchId);
                if ($existingSearchInput.length > 0) {
                    try {
                        if ($existingSearchInput.data("ui-autocomplete")) {
                            $existingSearchInput.autocomplete("destroy");
                        }
                    } catch (error) {
                    }
                    $existingSearchInput.off(".unifiSearchable");
                    $existingSearchInput.remove();
                }

                const $searchInput = $("<input>")
                    .attr("id", searchId)
                    .attr("type", "search")
                    .attr("autocomplete", "off")
                    .attr("placeholder", String(placeholder || "Search"))
                    .addClass("red-ui-input")
                    .css({
                        width: $select.css("width") || "100%",
                        marginBottom: "6px"
                    });
                $select.before($searchInput);
                $select.hide();

                const options = $select.find("option").map(function () {
                    const $option = $(this);
                    const optionValue = String($option.val() || "").trim();
                    const optionText = String($option.text() || "").trim();
                    return {
                        value: optionValue,
                        text: optionText,
                        isPlaceholder: optionValue === "",
                        searchable: [
                            optionText,
                            String($option.attr("data-device-name") || "").trim(),
                            String($option.attr("data-client-name") || "").trim(),
                            optionValue
                        ].filter(Boolean).join(" ").toLowerCase()
                    };
                }).get();

                function findOptionByValue(value) {
                    return options.find(function (option) {
                        return String(option.value) === String(value || "").trim();
                    });
                }

                function syncInputFromSelect() {
                    const selectedValue = String($select.val() || "").trim();
                    const selected = findOptionByValue(selectedValue);
                    if (selected && !selected.isPlaceholder) {
                        $searchInput.val(selected.text);
                    } else {
                        $searchInput.val("");
                    }
                }

                function setSelectedValue(value, triggerChange) {
                    const selected = findOptionByValue(value);
                    if (selected) {
                        $select.val(selected.value);
                    } else {
                        $select.val("");
                    }
                    syncInputFromSelect();
                    if (triggerChange) {
                        $select.trigger("change");
                    }
                }

                let filterOnKeyUpOnly = false;
                $searchInput.autocomplete({
                    minLength: 0,
                    source: function (request, response) {
                        const term = filterOnKeyUpOnly
                            ? String(request && request.term || "").trim().toLowerCase()
                            : "";
                        const items = options
                            .filter(function (option) {
                                if (option.isPlaceholder) {
                                    return false;
                                }
                                if (!term) {
                                    return true;
                                }
                                return option.searchable.indexOf(term) !== -1;
                            })
                            .map(function (option) {
                                return {
                                    label: option.text,
                                    value: option.text,
                                    optionValue: option.value
                                };
                            });

                        if (items.length === 0) {
                            response([{
                                label: "No results",
                                value: "",
                                optionValue: "",
                                noSelection: true
                            }]);
                            return;
                        }

                        response(items);
                    },
                    select: function (event, ui) {
                        if (ui.item && ui.item.noSelection) {
                            event.preventDefault();
                            return false;
                        }
                        if (ui.item) {
                            $select.data("unifi-user-selection", true);
                            setSelectedValue(ui.item.optionValue, true);
                        }
                        return true;
                    },
                    change: function (event, ui) {
                        if (ui.item) {
                            return;
                        }
                        const typed = String($searchInput.val() || "").trim().toLowerCase();
                        if (!typed) {
                            setSelectedValue("", true);
                            return;
                        }

                        const exactMatch = options.find(function (option) {
                            if (option.isPlaceholder) {
                                return false;
                            }
                            return option.text.toLowerCase() === typed || option.value.toLowerCase() === typed;
                        });

                        if (exactMatch) {
                            setSelectedValue(exactMatch.value, true);
                        } else {
                            syncInputFromSelect();
                        }
                    }
                });

                $searchInput.on("keyup.unifiSearchable", function () {
                    filterOnKeyUpOnly = true;
                    $(this).autocomplete("search", $(this).val());
                });
                $searchInput.on("mouseup.unifiSearchable", function () {
                    const $input = $(this);
                    filterOnKeyUpOnly = false;
                    setTimeout(function () {
                        $input.autocomplete("search", "");
                    }, 0);
                });

                syncInputFromSelect();
                $select.data("unifi-searchable", true);
                $select.data("unifi-options-count", options.length);
            }

            function syncCapabilityConfigFromInputs() {
                $capabilityConfigContainer.find("[id^='node-input-capability-config-']").each(function () {
                    const $field = $(this);
                    const fieldId = String($field.attr("id") || "").replace("node-input-capability-config-", "");
                    if (!fieldId) {
                        return;
                    }

                    if ($field.is(":checkbox")) {
                        capabilityConfig[fieldId] = $field.is(":checked");
                        return;
                    }

                    if ($field.is("select[multiple]")) {
                        capabilityConfig[fieldId] = $field.val() || [];
                        return;
                    }

                    capabilityConfig[fieldId] = $field.val();
                });

                writeCapabilityConfig();
            }

            function getSelectedDeviceName() {
                const $selected = $deviceId.find("option:selected");
                return String($selected.data("deviceName") || "").trim();
            }

            function getSelectedDeviceTypeLabel() {
                const selectedType = getCurrentOrNodeValue($deviceType, node.deviceType, "");
                const match = deviceTypeDefinitions.find(function (item) {
                    return item.type === selectedType;
                });
                return match ? String(match.label || "").trim() : "";
            }

            function getSelectedCapabilityDefinition() {
                const selectedCapability = getCurrentOrNodeValue($capability, node.capability, "observe");
                return capabilityDefinitions.find(function (item) {
                    return item.id === selectedCapability;
                }) || null;
            }

            function buildSelectionSummary(capabilityLabel, deviceName) {
                const normalizedLabel = String(capabilityLabel || "").trim();
                const normalizedDeviceName = String(deviceName || "").trim();

                if (!normalizedLabel || !normalizedDeviceName) {
                    return "";
                }

                if (normalizedLabel === "Receive Events") {
                    return "Listening for live events from " + normalizedDeviceName + ".";
                }

                if (normalizedLabel === "Read Device State") {
                    return "Reading the current state of " + normalizedDeviceName + ".";
                }

                if (normalizedLabel === "Take Snapshot") {
                    return "Taking a snapshot from " + normalizedDeviceName + ".";
                }

                if (normalizedLabel === "Read Application Info") {
                    return "Reading Protect application information.";
                }

                return normalizedLabel + " on " + normalizedDeviceName + ".";
            }

            function refreshSelectionSummary() {
                const selectedServer = String($server.val() || "").trim();
                const deviceTypeLabel = getSelectedDeviceTypeLabel();
                const deviceName = getSelectedDeviceName();
                const capabilityDefinition = getSelectedCapabilityDefinition();
                let summary = "Choose a connection to begin.";
                let detail = "The editor only shows actions supported by the selected UniFi Protect device.";

                if (selectedServer && selectedServer !== "_ADD_") {
                    summary = "Choose what you want to control.";
                    detail = "Start with a device type, then pick a device and an action.";
                }

                if (deviceTypeLabel) {
                    summary = "Choose the " + deviceTypeLabel.toLowerCase() + " you want to use.";
                    detail = "Only compatible UniFi Protect devices from this category will be shown.";
                }

                if (deviceName) {
                    summary = "Choose what you want to do with " + deviceName + ".";
                    detail = "Only actions supported by this device are listed.";
                }

                if (capabilityDefinition && deviceName) {
                    summary = buildSelectionSummary(capabilityDefinition.label, deviceName);
                    detail = capabilityDefinition.description || detail;
                } else if (capabilityDefinition && capabilityDefinition.description) {
                    detail = capabilityDefinition.description;
                }

                $selectionSummary.text(summary);
                $selectionDetail.text(detail);
            }

            function syncNameFromSelection() {
                const selectedDeviceName = getSelectedDeviceName();

                if (!selectedDeviceName) {
                    return;
                }

                $name.val(selectedDeviceName);
            }

            function rememberSelectedDeviceName() {
                const selectedDeviceName = getSelectedDeviceName();
                if (!selectedDeviceName) {
                    return;
                }
                $deviceName.val(selectedDeviceName);
            }

            function renderDeviceTypes(items) {
                deviceTypeDefinitions = Array.isArray(items) ? items.slice() : [];
                const currentValue = getCurrentOrNodeValue($deviceType, node.deviceType, "");
                withSuppressedChanges(function () {
                    $deviceType.empty();
                    $deviceType.append($("<option></option>").val("").text("Choose what to control"));

                    items.forEach(function (item) {
                        $deviceType.append(
                            $("<option></option>")
                                .val(item.type)
                                .text(item.label)
                        );
                    });

                    if (currentValue && $deviceType.find("option[value='" + currentValue + "']").length > 0) {
                        $deviceType.val(currentValue);
                    } else {
                        $deviceType.val("");
                    }
                });
                refreshSelectionSummary();
            }

            function renderCapabilities(items) {
                capabilityDefinitions = Array.isArray(items) ? items.slice() : [];
                const currentValue = getCurrentOrNodeValue($capability, node.capability, "observe");
                withSuppressedChanges(function () {
                    $capability.empty();

                    items.forEach(function (item) {
                        $capability.append(
                            $("<option></option>")
                                .val(item.id)
                                .attr("data-opens-stream", item.opensEventStream === true ? "true" : "false")
                                .text(item.label)
                        );
                    });

                    if (currentValue && $capability.find("option[value='" + currentValue + "']").length > 0) {
                        $capability.val(currentValue);
                    } else if ($capability.find("option[value='observe']").length > 0) {
                        $capability.val("observe");
                    }
                });
                refreshSelectionSummary();
            }

            function normalizeFieldValue(field, rawValue) {
                if (rawValue === undefined || rawValue === null) {
                    if (field.multiple) {
                        return [];
                    }
                    return field.defaultValue !== undefined ? field.defaultValue : "";
                }
                if (field.type === "checkbox") {
                    return rawValue === true || rawValue === "true";
                }
                if (field.multiple) {
                    return Array.isArray(rawValue) ? rawValue.map(String) : [String(rawValue)];
                }
                return String(rawValue).trim();
            }

            function resolveSelectValue(field, normalizedValue) {
                const optionValues = Array.isArray(field.options)
                    ? field.options.map(function (option) {
                        return String(option.value);
                    })
                    : [];

                if (field.multiple) {
                    const selectedValues = Array.isArray(normalizedValue) ? normalizedValue.map(String) : [];
                    const matchingValues = selectedValues.filter(function (value) {
                        return optionValues.indexOf(value) !== -1;
                    });
                    if (matchingValues.length > 0) {
                        return matchingValues;
                    }
                    if (Array.isArray(field.defaultValue)) {
                        return field.defaultValue.map(String).filter(function (value) {
                            return optionValues.indexOf(value) !== -1;
                        });
                    }
                    return [];
                }

                if (optionValues.indexOf(String(normalizedValue)) !== -1) {
                    return String(normalizedValue);
                }

                if (field.defaultValue !== undefined && field.defaultValue !== null) {
                    const fallbackValue = String(field.defaultValue).trim();
                    if (optionValues.indexOf(fallbackValue) !== -1) {
                        return fallbackValue;
                    }
                }

                if (field.allowEmpty) {
                    return "";
                }

                return optionValues.length > 0 ? optionValues[0] : "";
            }

            function applySelectValue($input, field, resolvedValue) {
                const selectedValues = field.multiple
                    ? (Array.isArray(resolvedValue) ? resolvedValue.map(String) : [])
                    : [String(resolvedValue)];

                $input.find("option").each(function () {
                    const $option = $(this);
                    const optionValue = String($option.val());
                    $option.prop("selected", selectedValues.indexOf(optionValue) !== -1);
                });

                if (field.multiple) {
                    $input.val(selectedValues);
                } else {
                    $input.val(selectedValues.length > 0 ? selectedValues[0] : "");
                    const selectedIndex = $input.find("option").toArray().findIndex(function (option) {
                        return String(option.value) === String(selectedValues.length > 0 ? selectedValues[0] : "");
                    });
                    if (selectedIndex >= 0 && $input.get(0)) {
                        $input.get(0).selectedIndex = selectedIndex;
                    }
                }
            }

            function restoreRenderedFieldValues(fields) {
                const liveCapabilityConfig = parseCapabilityConfig($capabilityConfig.val());

                (fields || []).forEach(function (field) {
                    if (field.type !== "select") {
                        return;
                    }

                    const $input = $("#node-input-capability-config-" + field.id);
                    if ($input.length === 0) {
                        return;
                    }

                    const currentValue = Object.prototype.hasOwnProperty.call(liveCapabilityConfig, field.id)
                        ? liveCapabilityConfig[field.id]
                        : undefined;
                    const normalizedValue = normalizeFieldValue(field, currentValue);
                    const resolvedValue = resolveSelectValue(field, normalizedValue);
                    applySelectValue($input, field, resolvedValue);
                });
            }

            function renderCapabilityOptions(data, options) {
                const renderOptions = options || {};
                const fields = data && Array.isArray(data.fields) ? data.fields : [];
                syncCapabilityConfigFromInputs();
                $capabilityConfigContainer.empty();

                if (fields.length === 0) {
                    $capabilityConfigRow.hide();
                    if (renderOptions.clearStoredConfig) {
                        capabilityConfig = {};
                        writeCapabilityConfig();
                    }
                    $capabilityConfigContainer.empty();
                    refreshSelectionSummary();
                    return;
                }

                if (renderOptions.clearStoredConfig) {
                    capabilityConfig = {};
                    writeCapabilityConfig();
                }

                $capabilityConfigRow.show();
                fields.forEach(function (field) {
                    const fieldId = "node-input-capability-config-" + field.id;
                    const $wrapper = $("<div></div>").css("margin-bottom", "8px");
                    const isHiddenField = field.type === "hidden";
                    const $label = $("<label></label>")
                        .attr("for", fieldId)
                        .css({ width: "140px", marginRight: "12px", display: "inline-block" })
                        .text(field.label || field.id);
                    let $input;

                    if (field.type === "select") {
                        $input = $("<select></select>").attr("id", fieldId).css("width", "calc(100% - 160px)");
                        if (field.multiple) {
                            $input.attr("multiple", "multiple").css("min-height", "88px");
                        }
                        if (field.placeholder && !field.allowEmpty) {
                            $input.append($("<option></option>").val("").text(field.placeholder));
                        }
                        (field.options || []).forEach(function (option) {
                            $input.append(
                                $("<option></option>")
                                    .val(option.value)
                                    .text(option.label)
                            );
                        });
                    } else if (field.type === "checkbox") {
                        $input = $("<input>").attr({ id: fieldId, type: "checkbox" });
                    } else if (field.type === "hidden") {
                        $input = $("<input>").attr({ id: fieldId, type: "hidden" });
                    } else {
                        $input = $("<input>").attr({
                            id: fieldId,
                            type: field.type === "number" ? "number" : "text",
                            placeholder: field.placeholder || ""
                        }).css("width", "calc(100% - 160px)");
                    }

                    const currentValue = Object.prototype.hasOwnProperty.call(capabilityConfig, field.id)
                        ? capabilityConfig[field.id]
                        : undefined;
                    const normalizedValue = normalizeFieldValue(field, currentValue);
                    const resolvedValue = field.type === "select"
                        ? resolveSelectValue(field, normalizedValue)
                        : normalizedValue;
                    if (!Object.prototype.hasOwnProperty.call(capabilityConfig, field.id) || field.type === "select") {
                        capabilityConfig[field.id] = resolvedValue;
                    }
                    if (field.type === "checkbox") {
                        $input.prop("checked", resolvedValue === true);
                    } else if (field.type === "hidden") {
                        $input.val(resolvedValue);
                    } else if (field.type === "select") {
                        applySelectValue($input, field, resolvedValue);
                    } else {
                        $input.val(resolvedValue);
                    }

                    $input.on("change input", function () {
                        if (field.type === "checkbox") {
                            capabilityConfig[field.id] = $(this).is(":checked");
                        } else if (field.multiple) {
                            capabilityConfig[field.id] = $(this).val() || [];
                        } else {
                            capabilityConfig[field.id] = $(this).val();
                        }

                        if (field.reloadOnChange && field.id === "propertyPath") {
                            delete capabilityConfig.propertyValue;
                            delete capabilityConfig.valueType;
                        }
                        if (field.reloadOnChange && field.id === "observable") {
                            delete capabilityConfig.observableScopeId;
                        }

                        writeCapabilityConfig();

                        if (field.reloadOnChange) {
                            syncCapabilityConfigFromInputs();
                            loadCapabilityOptions();
                        }
                    });

                    if (isHiddenField) {
                        $wrapper.append($input);
                    } else {
                        $wrapper.append($label).append($input);
                    }

                    if (field.helpText) {
                        $wrapper.append(
                            $("<div></div>")
                                .addClass("form-tips")
                                .css({ marginLeft: "152px" })
                                .text(field.helpText)
                        );
                    }

                    $capabilityConfigContainer.append($wrapper);
                });

                writeCapabilityConfig();
                restoreRenderedFieldValues(fields);
                setTimeout(function () {
                    restoreRenderedFieldValues(fields);
                }, 0);
                refreshSelectionSummary();
            }

            function renderDevices(items) {
                const currentValue = getCurrentOrNodeValue($deviceId, node.deviceId, "");
                withSuppressedChanges(function () {
                    $deviceId.empty();
                    $deviceId.append($("<option></option>").val("").text("Choose a device"));

                    items.forEach(function (item) {
                        const labelParts = [item.name || item.id];
                        if (item.state) {
                            labelParts.push("[" + item.state + "]");
                        }
                        $deviceId.append(
                            $("<option></option>")
                                .val(item.id)
                                .text(labelParts.join(" "))
                                .attr("data-device-name", item.name || item.id)
                        );
                    });

                    if (currentValue && $deviceId.find("option[value='" + currentValue + "']").length > 0) {
                        $deviceId.val(currentValue);
                    } else {
                        $deviceId.val("");
                    }
                });

                makeSelectSearchable($deviceId, "Search devices");
                rememberSelectedDeviceName();
                refreshSelectionSummary();
            }

            function loadCapabilities() {
                const requestId = ++capabilityListRequestId;
                const serverId = String($server.val() || "").trim();
                const selectedType = String($deviceType.val() || "").trim() || String(node.deviceType || "").trim();
                const selectedDeviceId = String($deviceId.val() || "").trim();
                if (!selectedType) {
                    renderCapabilities([]);
                    renderCapabilityOptions({ fields: [] }, { clearStoredConfig: false });
                    return Promise.resolve();
                }

                let requestUrl = "unifiProtect/device-capabilities?deviceType=" + encodeURIComponent(selectedType);
                if (serverId && serverId !== "_ADD_" && selectedDeviceId) {
                    requestUrl += "&serverId=" + encodeURIComponent(serverId) + "&deviceId=" + encodeURIComponent(selectedDeviceId);
                }

                return requestJson(requestUrl)
                    .then(function (data) {
                        if (requestId !== capabilityListRequestId) {
                            return;
                        }
                        renderCapabilities(Array.isArray(data) ? data : []);
                    })
                    .catch(function (xhr) {
                        if (requestId !== capabilityListRequestId) {
                            return;
                        }
                        renderCapabilities([]);
                        renderCapabilityOptions({ fields: [] }, { clearStoredConfig: false });
                        const errorText = xhr && xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : "Unable to load capabilities";
                        RED.notify(errorText, "error");
                    });
            }

            function loadCapabilityOptions() {
                const requestId = ++capabilityOptionsRequestId;
                const serverId = $server.val();
                const currentDeviceType = String($deviceType.val() || "").trim() || String(node.deviceType || "").trim();
                const currentDeviceId = String($deviceId.val() || "").trim();
                const currentCapability = String($capability.val() || "").trim() || String(node.capability || "observe").trim();
                if (!serverId || serverId === "_ADD_" || !currentDeviceType || !currentCapability) {
                    renderCapabilityOptions({ fields: [] }, { clearStoredConfig: false });
                    return Promise.resolve();
                }

                return requestJson(
                    "unifiProtect/device-capability-options?serverId=" + encodeURIComponent(serverId) +
                    "&deviceType=" + encodeURIComponent(currentDeviceType) +
                    "&deviceId=" + encodeURIComponent(currentDeviceId || "") +
                    "&capability=" + encodeURIComponent(currentCapability) +
                    "&capabilityConfig=" + encodeURIComponent(JSON.stringify(capabilityConfig || {}))
                ).then(function (data) {
                    if (requestId !== capabilityOptionsRequestId) {
                        return;
                    }
                    renderCapabilityOptions(data || { fields: [] });
                }).catch(function (xhr) {
                    if (requestId !== capabilityOptionsRequestId) {
                        return;
                    }
                    renderCapabilityOptions({ fields: [] }, { clearStoredConfig: false });
                    const errorText = xhr && xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : "Unable to load capability options";
                    RED.notify(errorText, "error");
                });
            }

            function loadDevices() {
                const serverId = $server.val();
                const selectedType = getCurrentOrNodeValue($deviceType, node.deviceType, "");
                if (!serverId || serverId === "_ADD_" || !selectedType) {
                    renderDevices([]);
                    renderCapabilityOptions({ fields: [] }, { clearStoredConfig: false });
                    return Promise.resolve();
                }

                $refresh.find("i").addClass("fa-spin");
                return requestJson(
                    "unifiProtect/devices?serverId=" + encodeURIComponent(serverId) + "&deviceType=" + encodeURIComponent(selectedType)
                ).then(function (data) {
                    renderDevices(Array.isArray(data) ? data : []);
                }).catch(function (xhr) {
                    renderDevices([]);
                    renderCapabilityOptions({ fields: [] }, { clearStoredConfig: false });
                    const errorText = xhr && xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : "Unable to load devices";
                    RED.notify(errorText, "error");
                }).finally(function () {
                    $refresh.find("i").removeClass("fa-spin");
                });
            }

            function loadDeviceTypes() {
                return requestJson("unifiProtect/device-types")
                    .then(function (data) {
                        renderDeviceTypes(Array.isArray(data) ? data : []);
                    })
                    .catch(function (xhr) {
                        renderDeviceTypes([]);
                        renderCapabilities([]);
                        renderDevices([]);
                        renderCapabilityOptions({ fields: [] }, { clearStoredConfig: false });
                        const errorText = xhr && xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : "Unable to load device types";
                        RED.notify(errorText, "error");
                    });
            }

            function refreshEditor() {
                // Protect editor dependencies are hierarchical: device types
                // first, then devices, then capabilities, then capability options.
                return loadDeviceTypes()
                    .then(function () {
                        return loadDevices();
                    })
                    .then(function () {
                        return loadCapabilities();
                    })
                    .then(function () {
                        return loadCapabilityOptions();
                    })
                    .finally(function () {
                        isInitializingEditor = false;
                    });
            }

            function refreshAfterServerChange() {
                return loadDevices()
                    .then(function () {
                        return loadCapabilities();
                    })
                    .then(function () {
                        return loadCapabilityOptions();
                    });
            }

            function refreshAfterTypeChange() {
                return loadDevices()
                    .then(function () {
                        return loadCapabilities();
                    })
                    .then(function () {
                        return loadCapabilityOptions();
                    });
            }

            function refreshAfterDeviceChange() {
                return loadCapabilities()
                    .then(function () {
                        return loadCapabilityOptions();
                    });
            }

            function refreshAfterCapabilityChange() {
                return loadCapabilityOptions();
            }

            try {
                RED.sidebar.show("help");
            } catch (error) {
            }

            writeCapabilityConfig();
            makeSelectSearchable($deviceId, "Search devices");

            $server.on("change", function () {
                if (suspendChangeHandling || isInitializingEditor) {
                    return;
                }
                refreshAfterServerChange();
            });
            $deviceType.on("change", function () {
                if (suspendChangeHandling || isInitializingEditor) {
                    return;
                }
                capabilityConfig = {};
                writeCapabilityConfig();
                refreshAfterTypeChange();
            });
            $deviceId.on("change", function () {
                if (suspendChangeHandling || isInitializingEditor) {
                    return;
                }
                rememberSelectedDeviceName();
                const isUserSelection = $deviceId.data("unifi-user-selection") === true;
                $deviceId.removeData("unifi-user-selection");
                if (isUserSelection) {
                    syncNameFromSelection();
                }
                capabilityConfig = {};
                writeCapabilityConfig();
                refreshAfterDeviceChange();
            });
            $capability.on("change", function () {
                if (suspendChangeHandling || isInitializingEditor) {
                    return;
                }
                capabilityConfig = {};
                writeCapabilityConfig();
                refreshAfterCapabilityChange();
            });
            $refresh.on("click", function (event) {
                event.preventDefault();
                refreshAfterServerChange();
            });

            refreshSelectionSummary();
            ensureDefaultServerSelection();
            refreshEditor();
        }
    });
</script>

<script type="text/html" data-help-name="unifi-protect-device">
    <p>Use this node to execute a configured UniFi Protect action or listen for live Protect events.</p>

    <h3>Configuration</h3>
    <p><b>Connection</b> selects the shared UniFi Protect config node.</p>
    <p><b>Control</b> chooses the Protect device category. <b>Device</b> chooses the specific item. Device selectors are searchable and open with the complete list before filtering.</p>
    <p><b>Action</b> only shows actions supported by the selected device.</p>
    <p><b>Action options</b> appears only when the selected action needs extra input. For example, observables, PTZ presets, live views, or discovered properties.</p>
    <p>Action highlights: <code>Receive Events</code>, <code>Read Device State</code>, <code>Take Snapshot</code>, <code>Show Doorbell Message</code>, and <code>Read Application Info</code> on <code>NVR</code>.</p>
    <p><code>Receive Events</code> performs an initial fetch and then stays connected to the Protect streams. In this mode, the input pin is hidden and listening starts automatically after deploy/restart.</p>
    <p>For <code>Sensor</code>, <code>Camera</code>, and <code>Light</code> observables, <code>All</code> emits every event for the selected device. Choosing a specific observable normalizes the main output to <code>true</code> or <code>false</code> and keeps the original context in <code>msg.details.raw</code>. Sensor observables include <code>Extreme Values</code>.</p>
    <p><b>Name</b> is the node name shown in the editor and is updated only when you manually select a different item from the list. <b>Timeout</b> controls the request timeout in milliseconds for direct API calls.</p>

    <h3>Input</h3>
    <ul>
        <li>When <code>Receive Events</code> is selected, the input pin is hidden.</li>
        <li>Any incoming message triggers the configured action.</li>
        <li>Input message properties are ignored by this node.</li>
    </ul>

    <h3>Output</h3>
    <ul>
        <li>A single output pin emits state and event messages for the selected device.</li>
        <li><code>msg.topic</code>: node name from the editor.</li>
        <li><code>msg.deviceName</code>: remembered/observed selected device name.</li>
        <li><code>msg.eventName</code>: trigger/event that produced the message.</li>
        <li><code>msg.details.unifiProtect</code>: standardized metadata for the device and selected capability.</li>
        <li><code>msg.details.raw</code>: raw event/context payload when available.</li>
    </ul>
    <p>Example output:</p>
    <pre><code>{
  "topic": "Front Door Camera",
  "deviceName": "Front Door Camera",
  "eventName": "smartDetectZone",
  "payload": {
    "device": {
      "id": "camera-id"
    },
    "event": {
      "type": "smartDetectZone"
    },
    "deviceName": "Front Door Camera"
  },
  "details": {
    "unifiProtect": {
      "nodeType": "device",
      "deviceType": "camera",
      "capability": "observe",
      "source": "events"
    }
  }
}</code></pre>
</script>
