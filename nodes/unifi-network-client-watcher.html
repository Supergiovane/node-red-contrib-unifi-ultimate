<script type="text/javascript">
    RED.nodes.registerType("unifi-network-client-watcher", {
        category: "Unifi Ultimate",
        color: "#CFE8FB",
        defaults: {
            name: { value: "" },
            server: { value: "", type: "unifi-network-config", required: true },
            watchBy: { value: "network", required: true },
            networkId: { value: "", required: true },
            networkName: { value: "" },
            pollInterval: { value: 30, required: true, validate: RED.validators.number() },
            emitInitial: { value: false }
        },
        inputs: 1,
        outputs: 2,
        icon: "unifi-u-logo-light-network.svg",
        paletteLabel: "Client Watcher",
        outputLabels: ["event", "error"],
        label: function () {
            return this.name || (this.networkName ? "Watch: " + this.networkName : "Client Watcher");
        },
        oneditsave: function () {
            const $selected = $("#node-input-networkId option:selected");
            this.networkName = String($selected.attr("data-network-name") || "").trim();
            $("#node-input-networkName").val(this.networkName);
        },
        oneditprepare: function () {
            const node = this;
            const $server = $("#node-input-server");
            const $watchBy = $("#node-input-watchBy");
            const $networkId = $("#node-input-networkId");
            const $networkName = $("#node-input-networkName");
            const $refresh = $("#node-input-refreshNetworks");
            const $watchByRow = $("#node-row-watchBy");
            const $networkRow = $("#node-row-networkId");
            const $status = $("#unifi-watcher-network-status");

            $watchBy.val(this.watchBy || "network");

            function currentWatchBy() {
                return String($watchBy.val() || "network").trim();
            }

            let loadedServerId = "";

            function hasSelection($field) {
                const value = String($field.val() || "").trim();
                return value !== "" && value !== "_ADD_";
            }

            function requestJson(url) {
                return new Promise(function (resolve, reject) {
                    $.getJSON(url, function (data) {
                        resolve(data);
                    }).fail(function (xhr) {
                        reject(xhr);
                    });
                });
            }

            function renderNetworks(items) {
                const currentValue = String($networkId.val() || node.networkId || "").trim();
                $networkId.empty();
                $networkId.append($("<option></option>").val("").text("Choose a network"));

                (items || []).forEach(function (item) {
                    const id = String(item.id || "").trim();
                    if (!id) {
                        return;
                    }
                    const name = String(item.name || id).trim();
                    const tags = [];
                    if (item.isGuest) {
                        tags.push("guest");
                    }
                    if (item.vlan) {
                        tags.push("VLAN " + item.vlan);
                    }
                    if (item.enabled === false) {
                        tags.push("disabled");
                    }
                    const suffix = tags.length > 0 ? " [" + tags.join(", ") + "]" : "";
                    $networkId.append(
                        $("<option></option>")
                            .val(id)
                            .text(name + suffix)
                            .attr("data-network-name", name)
                    );
                });

                if (currentValue && $networkId.find("option[value='" + currentValue + "']").length > 0) {
                    $networkId.val(currentValue);
                } else {
                    $networkId.val("");
                }
            }

            function loadNetworks(force) {
                const serverId = String($server.val() || "").trim();
                if (!serverId || serverId === "_ADD_") {
                    renderNetworks([]);
                    $status.text("");
                    return Promise.resolve();
                }
                if (!force && serverId === loadedServerId) {
                    return Promise.resolve();
                }

                $status.text("Loading networks...");
                $refresh.find("i").addClass("fa-spin");
                loadedServerId = serverId;
                return requestJson("unifiNetwork/networks?serverId=" + encodeURIComponent(serverId))
                    .then(function (networks) {
                        renderNetworks(Array.isArray(networks) ? networks : []);
                        $status.text("");
                    })
                    .catch(function (xhr) {
                        renderNetworks([]);
                        const message = xhr && xhr.responseJSON && xhr.responseJSON.error
                            ? xhr.responseJSON.error
                            : "Unable to load networks.";
                        $status.text(message);
                    })
                    .then(function () {
                        $refresh.find("i").removeClass("fa-spin");
                    });
            }

            function syncRows() {
                const hasServer = hasSelection($server);
                $watchByRow.toggle(hasServer);
                $networkRow.toggle(hasServer && currentWatchBy() === "network");
            }

            $refresh.on("click", function (event) {
                event.preventDefault();
                loadNetworks(true);
            });

            $watchBy.on("change", function () {
                syncRows();
                if (currentWatchBy() === "network") {
                    loadNetworks(false);
                }
            });

            $server.on("change", function () {
                syncRows();
                loadNetworks(false);
            });

            void $networkName;
            syncRows();
            loadNetworks(false);
        }
    });
</script>

<script type="text/html" data-template-name="unifi-network-client-watcher">
    <div class="form-row unifi-ultimate-product-logo-row">
        <img class="unifi-ultimate-product-logo" src="resources/node-red-contrib-unifi-ultimate/logos/unifi-network-black.svg" alt="UniFi Network logo" onerror="this.closest('.unifi-ultimate-product-logo-row').style.display='none';">

    <div class="form-row">
        <label for="node-input-server"><i class="fa fa-cog"></i> Connection</label>
        <input type="text" id="node-input-server">
    </div>
    <div class="form-row" id="node-row-watchBy" style="display:none;">
        <label for="node-input-watchBy"><i class="fa fa-eye"></i> Watch by</label>
        <select id="node-input-watchBy">
            <option value="network">Network Join/Leave</option>
        </select>
    </div>
    <div class="form-row" id="node-row-networkId" style="display:none;">
        <label for="node-input-networkId"><i class="fa fa-sitemap"></i> Network</label>
        <select id="node-input-networkId" style="width:62%;"></select>
        <a href="#" id="node-input-refreshNetworks" class="editor-button" style="margin-left:6px;" title="Reload networks" aria-label="Reload networks">
            <i class="fa fa-refresh"></i>
        </a>
        <div id="unifi-watcher-network-status" class="unifi-watcher-network-status"></div>
    </div>
    <div class="form-row">
        <div class="unifi-ultimate-card">
            <strong>Watches a network for clients joining or leaving.</strong>
            <div>Emits a message when a client connects to or disconnects from the selected network, including the device name.</div>
        </div>
    </div>
    <div id="node-row-advanced" class="unifi-ultimate-advanced">
        <div class="form-row">
            <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
            <input type="text" id="node-input-name" placeholder="Node name">
        </div>
        <div class="form-row">
            <label for="node-input-pollInterval"><i class="fa fa-repeat"></i> Poll (s)</label>
            <input type="text" id="node-input-pollInterval" placeholder="30">
        </div>
        <div class="form-row">
            <label for="node-input-emitInitial" style="width:auto;"><i class="fa fa-bullhorn"></i> Emit current clients on start</label>
            <input type="checkbox" id="node-input-emitInitial" style="display:inline-block; width:auto; vertical-align:top;">
        </div>
        <input type="hidden" id="node-input-networkName">
    </div>
</script>

<script type="text/html" data-help-name="unifi-network-client-watcher">
    <p>Watches a UniFi Network for clients <b>joining</b> or <b>leaving</b>, and emits the device name. For example, get notified when any device connects to your <code>Guest</code> network.</p>

    <h3>Configuration</h3>
    <p><b>Connection</b> selects the shared UniFi Network config node.</p>
    <p><b>Watch by</b> chooses what the node tracks. Currently <code>Network Join/Leave</code> (watch a network/VLAN for clients joining or leaving) is available; more criteria may be added later.</p>
    <p><b>Network</b> selects the L3 network / VLAN to watch (for example <code>Guest</code>). The list comes from the networks configured on your controller.</p>
    <p><b>Poll (s)</b> sets how often the node checks the connected clients of that network (default 30s).</p>
    <p><b>Emit current clients on start</b>, when enabled, emits a <code>joined</code> event for every client already connected to the network at deploy/restart. When disabled (default), the first poll silently establishes a baseline and only later changes are emitted.</p>
    <p><b>Name</b> is the node name shown in the editor.</p>

    <h3>Input</h3>
    <ul>
        <li>Any incoming message forces an immediate poll between intervals.</li>
    </ul>

    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>Output 1 — event</dt>
        <dd>Emitted once per client that joins or leaves the watched network.</dd>
        <dt class="optional">msg.eventName</dt>
        <dd><code>joined</code> or <code>left</code>.</dd>
        <dt class="optional">msg.deviceName</dt>
        <dd>The client's name (user-defined alias when set, otherwise hostname).</dd>
        <dt class="optional">msg.network</dt>
        <dd>The watched network name.</dd>
        <dt class="optional">msg.payload</dt>
        <dd>Object with <code>event</code>, <code>deviceName</code>, <code>mac</code>, <code>network</code>, <code>networkId</code>, <code>isGuest</code>, <code>isWired</code> and <code>ipAddress</code>.</dd>
        <dt class="optional">msg.details.client</dt>
        <dd>The full normalized client record.</dd>
    </dl>
    <dl class="message-properties">
        <dt>Output 2 — error</dt>
        <dd>Emitted when a poll fails (API error, timeout, or configuration problem). The node status also turns red. Errors are additionally forwarded to any connected <code>catch</code> node.</dd>
    </dl>
    <p>To route joins and leaves separately, follow Output 1 with a <code>switch</code> node on <code>msg.eventName</code>.</p>
    <p><b>Note:</b> per-client network membership is read through the UniFi legacy API, which the controller exposes alongside the official API.</p>
</script>
