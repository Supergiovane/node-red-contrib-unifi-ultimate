<style>
    .unifi-ultimate-card {
        margin-left: 150px;
        padding: 12px 14px;
        border-radius: 12px;
        background: #f5f7fa;
        color: #334155;
        line-height: 1.45;
    }

    .unifi-ultimate-card strong {
        display: block;
        margin-bottom: 4px;
        color: #0f172a;
        font-weight: 600;
    }

    .unifi-ultimate-advanced {
        margin-top: 4px;
        padding-top: 4px;
        border-top: 1px solid #e5e7eb;
    }

</style>

<script type="text/javascript">
    RED.nodes.registerType("unifi-network-control-poe", {
        category: "Unifi Ultimate",
        color: "#CFE8FB",
        defaults: {
            name: { value: "" },
            server: { value: "", type: "unifi-network-config", required: true },
            selectionMode: { value: "switchPort", required: true },
            clientLookupId: { value: "" },
            deviceId: { value: "", required: true },
            portIdx: { value: 1, required: true, validate: RED.validators.number() },
            action: { value: "cycle", required: true },
            timeout: { value: 15000, required: true, validate: RED.validators.number() }
        },
        inputs: 1,
        outputs: 1,
        icon: "unifi-network-icon.svg",
        paletteLabel: "Control POE",
        outputLabels: ["result"],
        label: function () {
            return this.name || "Control POE";
        },
        oneditprepare: function () {
            const node = this;
            const $name = $("#node-input-name");
            const $server = $("#node-input-server");
            const $selectionMode = $("#node-input-selectionMode");
            const $deviceId = $("#node-input-deviceId");
            const $clientLookupId = $("#node-input-clientLookupId");
            const $portIdx = $("#node-input-portIdx");
            const $action = $("#node-input-action");
            const $refreshDevices = $("#node-input-refreshDevices");
            const $refreshClients = $("#node-input-refreshClients");
            const $rowSwitch = $("#node-row-deviceId");
            const $rowClient = $("#node-row-clientLookupId");
            const $rowPort = $("#node-row-portIdx");
            const $selectionSummary = $("#node-input-selectionSummary");
            const $selectionDetail = $("#node-input-selectionDetail");
            let suspendChangeHandling = false;

            function requestJson(url) {
                return new Promise(function (resolve, reject) {
                    $.getJSON(url, function (data) {
                        resolve(data);
                    }).fail(function (xhr) {
                        reject(xhr);
                    });
                });
            }

            function getConfigNodesByType(configType) {
                const configs = [];
                try {
                    if (RED && RED.nodes) {
                        // Read config nodes from the current editor workspace to
                        // auto-bind new POE nodes to an existing Network config.
                        if (typeof RED.nodes.eachConfig === "function") {
                            RED.nodes.eachConfig(function (cfg) {
                                if (cfg && cfg.type === configType) {
                                    configs.push(cfg);
                                }
                            });
                        } else if (typeof RED.nodes.eachNode === "function") {
                            RED.nodes.eachNode(function (cfg) {
                                if (cfg && cfg.type === configType) {
                                    configs.push(cfg);
                                }
                            });
                        }

                        if (configs.length === 0 && typeof RED.nodes.filterNodes === "function") {
                            try {
                                const filtered = RED.nodes.filterNodes({ type: configType });
                                if (Array.isArray(filtered)) {
                                    filtered.forEach(function (cfg) {
                                        configs.push(cfg);
                                    });
                                }
                            } catch (error) {
                            }
                        }
                    }
                } catch (error) {
                }
                return configs;
            }

            function ensureDefaultServerSelection() {
                // Only fill the connection automatically when the field is empty.
                const currentValue = String($server.val() || node.server || "").trim();
                if (currentValue !== "" && currentValue !== "_ADD_") {
                    return;
                }

                const configs = getConfigNodesByType("unifi-network-config");
                if (!Array.isArray(configs) || configs.length === 0) {
                    return;
                }

                const firstConfigId = String(configs[0].id || "").trim();
                if (!firstConfigId) {
                    return;
                }

                $server.val(firstConfigId);
            }

            function makeSelectSearchable($select, placeholder) {
                if (!$select || $select.length === 0) {
                    return;
                }
                const selectId = String($select.attr("id") || "").trim();
                if (!selectId) {
                    return;
                }

                const searchId = selectId + "-search";
                $select.off(".unifiSearchable");
                $select.removeData("unifi-searchable");
                $select.removeData("unifi-options-count");
                $select.show();

                if ($select.is("select[multiple]")) {
                    return;
                }

                const $existingSearchInput = $("#" + searchId);
                if ($existingSearchInput.length > 0) {
                    try {
                        if ($existingSearchInput.data("ui-autocomplete")) {
                            $existingSearchInput.autocomplete("destroy");
                        }
                    } catch (error) {
                    }
                    $existingSearchInput.off(".unifiSearchable");
                    $existingSearchInput.remove();
                }

                const $searchInput = $("<input>")
                    .attr("id", searchId)
                    .attr("type", "search")
                    .attr("autocomplete", "off")
                    .attr("placeholder", String(placeholder || "Search"))
                    .addClass("red-ui-input")
                    .css({
                        width: $select.css("width") || "100%",
                        marginBottom: "6px"
                    });
                $select.before($searchInput);
                $select.hide();

                const options = $select.find("option").map(function () {
                    const $option = $(this);
                    const optionValue = String($option.val() || "").trim();
                    const optionText = String($option.text() || "").trim();
                    return {
                        value: optionValue,
                        text: optionText,
                        isPlaceholder: optionValue === "",
                        searchable: [
                            optionText,
                            String($option.attr("data-device-name") || "").trim(),
                            String($option.attr("data-client-name") || "").trim(),
                            optionValue
                        ].filter(Boolean).join(" ").toLowerCase()
                    };
                }).get();

                function findOptionByValue(value) {
                    return options.find(function (option) {
                        return String(option.value) === String(value || "").trim();
                    });
                }

                function syncInputFromSelect() {
                    const selectedValue = String($select.val() || "").trim();
                    const selected = findOptionByValue(selectedValue);
                    if (selected && !selected.isPlaceholder) {
                        $searchInput.val(selected.text);
                    } else {
                        $searchInput.val("");
                    }
                }

                function setSelectedValue(value, triggerChange) {
                    const selected = findOptionByValue(value);
                    if (selected) {
                        $select.val(selected.value);
                    } else {
                        $select.val("");
                    }
                    syncInputFromSelect();
                    if (triggerChange) {
                        $select.trigger("change");
                    }
                }

                let filterOnKeyUpOnly = false;
                $searchInput.autocomplete({
                    minLength: 0,
                    source: function (request, response) {
                        const term = filterOnKeyUpOnly
                            ? String(request && request.term || "").trim().toLowerCase()
                            : "";
                        const items = options
                            .filter(function (option) {
                                if (option.isPlaceholder) {
                                    return false;
                                }
                                if (!term) {
                                    return true;
                                }
                                return option.searchable.indexOf(term) !== -1;
                            })
                            .map(function (option) {
                                return {
                                    label: option.text,
                                    value: option.text,
                                    optionValue: option.value
                                };
                            });

                        if (items.length === 0) {
                            response([{
                                label: "No results",
                                value: "",
                                optionValue: "",
                                noSelection: true
                            }]);
                            return;
                        }

                        response(items);
                    },
                    select: function (event, ui) {
                        if (ui.item && ui.item.noSelection) {
                            event.preventDefault();
                            return false;
                        }
                        if (ui.item) {
                            setSelectedValue(ui.item.optionValue, true);
                        }
                        return true;
                    },
                    change: function (event, ui) {
                        if (ui.item) {
                            return;
                        }
                        const typed = String($searchInput.val() || "").trim().toLowerCase();
                        if (!typed) {
                            setSelectedValue("", true);
                            return;
                        }

                        const exactMatch = options.find(function (option) {
                            if (option.isPlaceholder) {
                                return false;
                            }
                            return option.text.toLowerCase() === typed || option.value.toLowerCase() === typed;
                        });

                        if (exactMatch) {
                            setSelectedValue(exactMatch.value, true);
                        } else {
                            syncInputFromSelect();
                        }
                    }
                });

                $searchInput.on("keyup.unifiSearchable", function () {
                    filterOnKeyUpOnly = true;
                    $(this).autocomplete("search", $(this).val());
                });
                $searchInput.on("mouseup.unifiSearchable", function () {
                    const $input = $(this);
                    filterOnKeyUpOnly = false;
                    setTimeout(function () {
                        $input.autocomplete("search", "");
                    }, 0);
                });

                syncInputFromSelect();
                $select.data("unifi-searchable", true);
                $select.data("unifi-options-count", options.length);
            }

            function getSelectedDeviceName() {
                const $selected = $deviceId.find("option:selected");
                return String($selected.data("deviceName") || "").trim();
            }

            function getSelectedClientName() {
                const $selected = $clientLookupId.find("option:selected");
                return String($selected.data("clientName") || "").trim();
            }

            function getSelectionMode() {
                const mode = String($selectionMode.val() || node.selectionMode || "switchPort").trim();
                return mode === "client" ? "client" : "switchPort";
            }

            function refreshSelectionModeUi() {
                const mode = getSelectionMode();
                if (mode === "client") {
                    $rowClient.show();
                    $rowSwitch.hide();
                    $rowPort.hide();
                } else {
                    $rowClient.hide();
                    $rowSwitch.show();
                    $rowPort.show();
                }
            }

            function refreshSummary() {
                const deviceName = getSelectedDeviceName();
                const clientName = getSelectedClientName();
                const mode = getSelectionMode();
                const actionLabel = String($action.find("option:selected").text() || "Power Cycle Port").trim();
                const portLabel = String($portIdx.val() || "").trim();

                let summary = "Choose a switch and a port.";
                let detail = "This node sends a port action request to UniFi Network.";

                if (deviceName) {
                    summary = actionLabel + " on " + deviceName + " (port " + (portLabel || "?") + ").";
                    detail = "Any incoming message triggers the configured action.";
                }
                if (mode === "client") {
                    summary = "Choose a client target.";
                    detail = "Selecting a client auto-fills switch and port from the attached uplink.";
                    if (clientName) {
                        summary = actionLabel + " on " + clientName + " (derived switch/port).";
                    }
                }

                $selectionSummary.text(summary);
                $selectionDetail.text(detail);
            }

            function syncNameFromSelection() {
                const targetName = getSelectionMode() === "client"
                    ? getSelectedClientName()
                    : getSelectedDeviceName();
                if (!targetName) {
                    return;
                }

                const value = "POE " + targetName;
                $name.val(value);
            }

            function renderDevices(items) {
                const currentValue = String($deviceId.val() || node.deviceId || "").trim();
                suspendChangeHandling = true;
                try {
                    $deviceId.empty();
                    $deviceId.append($("<option></option>").val("").text("Choose a switch"));

                    (items || []).forEach(function (item) {
                        const stateSuffix = item.state ? " [" + item.state + "]" : "";
                        $deviceId.append(
                            $("<option></option>")
                                .val(item.id)
                                .text((item.name || item.id) + stateSuffix)
                                .attr("data-device-name", item.name || item.id)
                        );
                    });

                    if (currentValue && $deviceId.find("option[value='" + currentValue + "']").length > 0) {
                        $deviceId.val(currentValue);
                    } else {
                        $deviceId.val("");
                    }
                } finally {
                    suspendChangeHandling = false;
                }

                makeSelectSearchable($deviceId, "Search switches");
                syncNameFromSelection();
                refreshSummary();
            }

            function renderPorts(ports) {
                const currentValue = String($portIdx.val() || node.portIdx || "").trim();
                suspendChangeHandling = true;
                try {
                    $portIdx.empty();

                    (ports || []).forEach(function (port) {
                        const idx = String(port.idx);
                        const poe = port.poeEnabled ? " PoE:" + port.poeEnabled : "";
                        const state = port.state ? " [" + port.state + "]" : "";
                        const clients = Array.isArray(port.connectedClientNames)
                            ? port.connectedClientNames.filter(Boolean)
                            : [];
                        const clientSuffix = clients.length > 0
                            ? " -> " + clients.join(", ")
                            : "";
                        $portIdx.append(
                            $("<option></option>")
                                .val(idx)
                                .text((port.name || ("Port " + idx)) + state + poe + clientSuffix)
                        );
                    });

                    if (currentValue && $portIdx.find("option[value='" + currentValue + "']").length > 0) {
                        $portIdx.val(currentValue);
                    } else if (ports && ports.length > 0) {
                        $portIdx.val(String(ports[0].idx));
                    } else {
                        $portIdx.append($("<option></option>").val(currentValue || "1").text("Port " + (currentValue || "1")));
                        $portIdx.val(currentValue || "1");
                    }
                } finally {
                    suspendChangeHandling = false;
                }

                refreshSummary();
            }

            function renderClients(items) {
                const currentValue = String($clientLookupId.val() || node.clientLookupId || "").trim();
                suspendChangeHandling = true;
                try {
                    $clientLookupId.empty();
                    $clientLookupId.append($("<option></option>").val("").text("Choose a client target"));

                    (items || []).forEach(function (item) {
                        const stateSuffix = item.state ? " [" + item.state + "]" : "";
                        const attachment = item.attachment && typeof item.attachment === "object" ? item.attachment : {};
                        const attachedDeviceName = String(attachment.deviceName || "Switch").trim();
                        const attachedPortIdx = String(attachment.portIdx !== undefined ? attachment.portIdx : "").trim();
                        const attachedDeviceId = String(attachment.deviceId || "").trim();
                        if (!attachedDeviceId || attachedPortIdx === "") {
                            return;
                        }
                        const attachmentSuffix = " -> " + attachedDeviceName + " p" + attachedPortIdx;
                        $clientLookupId.append(
                            $("<option></option>")
                                .val(item.id)
                                .text((item.name || item.id) + stateSuffix + attachmentSuffix)
                                .attr("data-client-name", item.name || item.id)
                                .attr("data-attached-device-id", attachedDeviceId)
                                .attr("data-attached-port-idx", attachedPortIdx)
                                .attr("data-attached-device-name", attachedDeviceName)
                        );
                    });

                    if (currentValue && $clientLookupId.find("option[value='" + currentValue + "']").length > 0) {
                        $clientLookupId.val(currentValue);
                    } else {
                        $clientLookupId.val("");
                    }
                } finally {
                    suspendChangeHandling = false;
                }

                makeSelectSearchable($clientLookupId, "Search clients");
                refreshSummary();
            }

            function hasOptionValue($select, value) {
                const normalizedTarget = String(value || "").trim();
                if (!normalizedTarget) {
                    return false;
                }

                return $select.find("option").toArray().some(function (option) {
                    return String(option.value || "").trim() === normalizedTarget;
                });
            }

            function loadPorts() {
                const serverId = String($server.val() || "").trim();
                const deviceId = String($deviceId.val() || "").trim();
                if (!serverId || !deviceId || serverId === "_ADD_") {
                    renderPorts([]);
                    return Promise.resolve();
                }

                return requestJson(
                    "unifiNetwork/device-ports?serverId=" + encodeURIComponent(serverId) +
                    "&deviceId=" + encodeURIComponent(deviceId)
                ).then(function (data) {
                    renderPorts(Array.isArray(data) ? data : []);
                }).catch(function (xhr) {
                    renderPorts([]);
                    const errorText = xhr && xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : "Unable to load ports";
                    RED.notify(errorText, "error");
                });
            }

            function loadDevices() {
                const serverId = String($server.val() || "").trim();
                if (!serverId || serverId === "_ADD_") {
                    renderDevices([]);
                    renderPorts([]);
                    return Promise.resolve();
                }

                // Ports depend on the selected switch, so refresh both lists in
                // one flow whenever the connection changes.
                $refreshDevices.addClass("fa-spin");
                return requestJson("unifiNetwork/devices?serverId=" + encodeURIComponent(serverId) + "&deviceType=device")
                    .then(function (data) {
                        renderDevices(Array.isArray(data) ? data : []);
                        return loadPorts();
                    })
                    .catch(function (xhr) {
                        renderDevices([]);
                        renderPorts([]);
                        const errorText = xhr && xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : "Unable to load devices";
                        RED.notify(errorText, "error");
                    })
                    .finally(function () {
                        $refreshDevices.removeClass("fa-spin");
                    });
            }

            function loadClients() {
                const serverId = String($server.val() || "").trim();
                if (!serverId || serverId === "_ADD_") {
                    renderClients([]);
                    return Promise.resolve();
                }

                $refreshClients.addClass("fa-spin");
                return requestJson("unifiNetwork/clients-with-attachment?serverId=" + encodeURIComponent(serverId))
                    .then(function (data) {
                        renderClients(Array.isArray(data) ? data : []);
                    })
                    .catch(function (xhr) {
                        renderClients([]);
                        const errorText = xhr && xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : "Unable to load clients";
                        RED.notify(errorText, "error");
                    })
                    .finally(function () {
                        $refreshClients.removeClass("fa-spin");
                    });
            }

            function applySelectedClientTarget() {
                const $selected = $clientLookupId.find("option:selected");
                const targetDeviceId = String($selected.attr("data-attached-device-id") || "").trim();
                const targetPortIdx = String($selected.attr("data-attached-port-idx") || "").trim();
                if (!targetDeviceId || targetPortIdx === "") {
                    refreshSummary();
                    return Promise.resolve();
                }

                const ensureDevicePresent = hasOptionValue($deviceId, targetDeviceId)
                    ? Promise.resolve()
                    : loadDevices();

                return ensureDevicePresent.then(function () {
                    if (!hasOptionValue($deviceId, targetDeviceId)) {
                        refreshSummary();
                        return;
                    }

                    suspendChangeHandling = true;
                    try {
                        $deviceId.val(targetDeviceId);
                    } finally {
                        suspendChangeHandling = false;
                    }
                    makeSelectSearchable($deviceId, "Search switches");
                    syncNameFromSelection();

                    return loadPorts().then(function () {
                        if (hasOptionValue($portIdx, targetPortIdx)) {
                            suspendChangeHandling = true;
                            try {
                                $portIdx.val(targetPortIdx);
                            } finally {
                                suspendChangeHandling = false;
                            }
                        }

                        refreshSummary();
                    });
                });
            }

            function loadEditorData() {
                return loadDevices().then(function () {
                    return loadClients();
                }).then(function () {
                    if (getSelectionMode() === "client") {
                        return applySelectedClientTarget();
                    }
                }).finally(function () {
                    refreshSummary();
                });
            }

            try {
                RED.sidebar.show("help");
            } catch (error) {
            }

            $server.on("change", function () {
                if (suspendChangeHandling) {
                    return;
                }
                loadEditorData();
            });

            $deviceId.on("change", function () {
                if (suspendChangeHandling) {
                    return;
                }
                syncNameFromSelection();
                loadPorts();
            });

            $portIdx.on("change", refreshSummary);
            $action.on("change", refreshSummary);
            $selectionMode.on("change", function () {
                if (suspendChangeHandling) {
                    return;
                }
                refreshSelectionModeUi();
                if (getSelectionMode() === "client") {
                    applySelectedClientTarget();
                } else {
                    refreshSummary();
                }
            });
            $clientLookupId.on("change", function () {
                if (suspendChangeHandling) {
                    return;
                }
                if (getSelectionMode() === "client") {
                    applySelectedClientTarget();
                } else {
                    refreshSummary();
                }
            });

            $refreshDevices.on("click", function (event) {
                event.preventDefault();
                loadDevices().then(function () {
                    if (getSelectionMode() === "client") {
                        return applySelectedClientTarget();
                    }
                });
            });
            $refreshClients.on("click", function (event) {
                event.preventDefault();
                loadClients().then(function () {
                    if (getSelectionMode() === "client") {
                        return applySelectedClientTarget();
                    }
                });
            });

            ensureDefaultServerSelection();
            $selectionMode.val(String(node.selectionMode || "switchPort"));
            $action.val(String(node.action || "cycle"));
            if (!$action.val()) {
                $action.val("cycle");
            }
            makeSelectSearchable($deviceId, "Search switches");
            makeSelectSearchable($clientLookupId, "Search clients");
            refreshSelectionModeUi();
            loadEditorData();
        }
    });
</script>

<script type="text/html" data-template-name="unifi-network-control-poe">
    <div class="form-row">
        <label for="node-input-server"><i class="fa fa-cog"></i> Connection</label>
        <input type="text" id="node-input-server">
    </div>
    <div class="form-row">
        <label for="node-input-selectionMode"><i class="fa fa-crosshairs"></i> Search by</label>
        <select id="node-input-selectionMode">
            <option value="switchPort">Switch + Port</option>
            <option value="client">Client</option>
        </select>
    </div>
    <div class="form-row" id="node-row-deviceId">
        <label for="node-input-deviceId"><i class="fa fa-exchange"></i> Switch</label>
        <select id="node-input-deviceId" style="width:70%;"></select>
        <a href="#" id="node-input-refreshDevices" class="editor-button" style="margin-left:6px;">
            <i class="fa fa-refresh"></i>
        </a>
    </div>
    <div class="form-row" id="node-row-clientLookupId">
        <label for="node-input-clientLookupId"><i class="fa fa-laptop"></i> Client</label>
        <select id="node-input-clientLookupId" style="width:70%;"></select>
        <a href="#" id="node-input-refreshClients" class="editor-button" style="margin-left:6px;">
            <i class="fa fa-refresh"></i>
        </a>
    </div>
    <div class="form-row" id="node-row-portIdx">
        <label for="node-input-portIdx"><i class="fa fa-plug"></i> Port</label>
        <select id="node-input-portIdx"></select>
    </div>
    <div class="form-row">
        <label for="node-input-action"><i class="fa fa-power-off"></i> Action</label>
        <select id="node-input-action">
            <option value="enable">Enable PoE</option>
            <option value="disable">Disable PoE</option>
            <option value="cycle">Power Cycle</option>
        </select>
    </div>
    <div class="form-row">
        <div class="unifi-ultimate-card">
            <strong id="node-input-selectionSummary">Choose a switch and a port.</strong>
            <div id="node-input-selectionDetail">This node sends a port action request to UniFi Network.</div>
        </div>
    </div>
    <div id="node-row-advanced" class="unifi-ultimate-advanced">
        <div class="form-row">
            <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
            <input type="text" id="node-input-name" placeholder="Node name">
        </div>
        <div class="form-row">
            <label for="node-input-timeout"><i class="fa fa-clock-o"></i> Timeout</label>
            <input type="text" id="node-input-timeout" placeholder="15000">
        </div>
    </div>
</script>

<script type="text/html" data-help-name="unifi-network-control-poe">
    <p>Controls PoE on a selected UniFi switch port.</p>

    <h3>Configuration</h3>
    <p><b>Connection</b> selects the shared UniFi Network config node.</p>
    <p><b>Search by</b> chooses how to target the port: select <code>Switch + Port</code> directly, or select a <code>Client</code> and let the node fill in the connected switch and port.</p>
    <p><b>Switch</b> selects the adopted UniFi switch. The selector is searchable.</p>
    <p><b>Client</b> lists clients with known switch and port mapping. The selector is searchable.</p>
    <p><b>Port</b> selects the physical port index. Port labels include connected clients or downstream UniFi devices when available.</p>
    <p><b>Action</b> executes the configured PoE operation. Enable and Disable update the UniFi port override (<code>poe_mode</code> auto/off). Power Cycle uses the official Network port action.</p>
    <p><b>Name</b> is the node name shown in the editor and is updated automatically when you select a different switch or client target.</p>
    <p><b>Timeout</b> controls the request timeout in milliseconds.</p>

    <h3>Input</h3>
    <ul>
        <li>Any incoming message triggers the configured action.</li>
        <li>Input message properties are ignored by this node.</li>
    </ul>

    <h3>Output</h3>
    <ul>
        <li>The node emits a new message after the configured action completes.</li>
        <li><code>msg.payload</code>: API response payload.</li>
        <li><code>msg.unifiNetworkPoe</code>: metadata with device/site/action/port.</li>
