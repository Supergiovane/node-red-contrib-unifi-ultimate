<link rel="stylesheet" type="text/css"
    href="resources/node-red-contrib-unifi-ultimate/editor/unifi-ultimate-editor-common.css">


<script type="text/javascript">
    RED.nodes.registerType("unifi-network-control-poe", {
        category: "Unifi Ultimate",
        color: "#CFE8FB",
        defaults: {
            name: { value: "" },
            server: { value: "", type: "unifi-network-config", required: true },
            selectionMode: { value: "switchPort", required: true },
            clientLookupId: { value: "" },
            deviceId: { value: "" },
            deviceName: { value: "" },
            portIdx: { value: 1 },
            controlType: { value: "poe", required: true },
            action: { value: "msgPayload", required: true },
            targets: {
                value: "[]",
                validate: function (value) {
                    try {
                        const parsed = JSON.parse(value || "[]");
                        return Array.isArray(parsed) && parsed.length > 0;
                    } catch (error) {
                        return false;
                    }
                }
            }
        },
        inputs: 1,
        outputs: 2,
        icon: "unifi-u-logo-light-network.svg",
        paletteLabel: "Clients Control",
        outputLabels: ["result", "error"],
        label: function () {
            return this.name || "Clients Control";
        },
        oneditsave: function () {
            // The clients list is persisted through the hidden #node-input-targets
            // field. Here we only keep the dynamic input-pin visibility in sync:
            // the streaming power-observation action accepts no input trigger.
            const actionValue = String($("#node-input-action").val() || "").trim().toLowerCase();
            const opensObservation = ["emitpowerconsumption"].includes(actionValue);
            this.inputs = opensObservation ? 0 : 1;
        },
        oneditprepare: function () {
            const node = this;
            const $name = $("#node-input-name");
            const $deviceName = $("#node-input-deviceName");
            const $server = $("#node-input-server");
            const $selectionMode = $("#node-input-selectionMode");
            const $deviceId = $("#node-input-deviceId");
            const $clientLookupId = $("#node-input-clientLookupId");
            const $portIdx = $("#node-input-portIdx");
            const $controlType = $("#node-input-controlType");
            const $controlTypeRow = $("#node-row-controlType");
            const $action = $("#node-input-action");
            const $refreshDevices = $("#node-input-refreshDevices");
            const $refreshClients = $("#node-input-refreshClients");
            const $rowSwitch = $("#node-row-deviceId");
            const $rowClient = $("#node-row-clientLookupId");
            const $rowPort = $("#node-row-portIdx");
            const $selectionModeRow = $selectionMode.closest(".form-row");
            const $actionRow = $action.closest(".form-row");
            const $warningRow = $(".unifi-ultimate-warning").closest(".form-row");
            const $advancedRow = $("#node-row-advanced");
            const $addTarget = $("#node-input-addTarget");
            const $addRow = $("#node-row-addTarget");
            const $pickerBox = $("#node-row-picker");
            const $targetsRow = $("#node-row-targets");
            let targetList = [];
            let suspendChangeHandling = false;
            let isInitializingEditor = true;
            let clientTargetsPopulated = false;
            let clientTargetsLoading = false;
            let clientsLoadedForServerId = "";
            let clientsRequestPromise = null;
            let clientWaitOverlayDepth = 0;

            function hasSelection($field) {
                const value = String($field.val() || "").trim();
                return value !== "" && value !== "_ADD_";
            }

            function syncProgressiveRows() {
                const hasServer = hasSelection($server);
                const mode = getSelectionMode();
                const hasSwitch = hasSelection($deviceId);
                const hasPort = hasSelection($portIdx);
                const hasClient = hasSelection($clientLookupId);
                // A "current selection" is what the Add button would append; the
                // action and downstream rows depend on the accumulated list.
                const hasCurrentSelection = mode === "client" ? hasClient : (hasSwitch && hasPort);
                const hasList = targetList.length > 0;
                const hasAction = hasSelection($action);

                $pickerBox.toggle(hasServer);
                $selectionModeRow.toggle(hasServer);
                $rowSwitch.toggle(hasServer && mode === "switchPort");
                $rowPort.toggle(hasServer && mode === "switchPort" && hasSwitch);
                $rowClient.toggle(hasServer && mode === "client");
                $addRow.toggle(hasServer && hasCurrentSelection);
                $targetsRow.toggle(hasServer);
                $controlTypeRow.toggle(hasServer && hasList);
                $actionRow.toggle(hasServer && hasList);
                $warningRow.toggle(hasServer && hasList && hasAction);
                $advancedRow.toggle(hasServer && hasList && hasAction);
            }

            function targetKey(target) {
                return String(target.deviceId) + "|" + String(target.portIdx);
            }

            function persistTargets() {
                $("#node-input-targets").val(JSON.stringify(targetList));
            }

            function getCurrentSelectionTarget() {
                if (getSelectionMode() === "client") {
                    const $selected = $clientLookupId.find("option:selected");
                    const deviceId = String($selected.attr("data-attached-device-id") || "").trim();
                    const portRaw = String($selected.attr("data-attached-port-idx") || "").trim();
                    const clientId = String($clientLookupId.val() || "").trim();
                    const portIdx = Number(portRaw);
                    if (!deviceId || portRaw === "" || !Number.isFinite(portIdx) || !clientId) {
                        return null;
                    }
                    const clientName = String($selected.attr("data-client-name") || "").trim();
                    const switchName = String($selected.attr("data-attached-device-name") || "Switch").trim();
                    return {
                        deviceId: deviceId,
                        portIdx: portIdx,
                        clientId: clientId,
                        name: (clientName || clientId) + " → " + switchName + " p" + portIdx
                    };
                }

                const deviceId = String($deviceId.val() || "").trim();
                const portRaw = String($portIdx.val() || "").trim();
                const portIdx = Number(portRaw);
                if (!deviceId || deviceId === "_ADD_" || portRaw === "" || !Number.isFinite(portIdx)) {
                    return null;
                }
                const deviceName = getSelectedDeviceName() || deviceId;
                return {
                    deviceId: deviceId,
                    portIdx: portIdx,
                    clientId: "",
                    name: deviceName + " p" + portIdx
                };
            }

            function renderTargetList() {
                const $list = $("#unifi-poe-target-list");
                $list.empty();

                if (targetList.length === 0) {
                    $list.append(
                        $("<div class='unifi-poe-target-empty'></div>")
                            .text("No clients added yet. Pick a target above and click \"Add to list\".")
                    );
                } else {
                    targetList.forEach(function (target, index) {
                        const $row = $("<div class='unifi-poe-target-row'></div>");
                        $row.append(
                            $("<span class='unifi-poe-target-name'></span>")
                                .text(target.name || (target.deviceId + " p" + target.portIdx))
                        );
                        $row.append($("<span class='unifi-poe-target-meta'></span>").text("p" + target.portIdx));
                        const $remove = $("<a href='#' class='unifi-poe-target-remove' title='Remove'><i class='fa fa-times'></i></a>");
                        $remove.on("click", function (event) {
                            event.preventDefault();
                            targetList.splice(index, 1);
                            renderTargetList();
                            syncPowerActionAvailability();
                            refreshSummary();
                        });
                        $row.append($remove);
                        $list.append($row);
                    });
                }

                $("#unifi-poe-target-count").text(targetList.length + " selected");
                persistTargets();
            }

            function addCurrentTarget() {
                const target = getCurrentSelectionTarget();
                if (!target) {
                    RED.notify("Select a switch port or a client first.", "warning");
                    return;
                }
                if (targetList.some(function (existing) { return targetKey(existing) === targetKey(target); })) {
                    RED.notify("That port is already in the list.", "info");
                    return;
                }

                targetList.push(target);
                renderTargetList();
                syncPowerActionAvailability();
                refreshSummary();
            }

            function syncPowerActionAvailability() {
                // The streaming "Emit Power Consumption" action only makes sense
                // for a single target, so it is disabled for lists of 0 or 2+.
                const $option = $action.find("option[value='emitPowerConsumption']");
                const allowed = targetList.length === 1;
                $option.prop("disabled", !allowed);
                if (!allowed && getSelectedActionValue() === "emitpowerconsumption") {
                    $action.val("msgPayload");
                    refreshActionUi();
                }
            }

            function initTargetList() {
                let stored = [];
                try {
                    if (Array.isArray(node.targets)) {
                        stored = node.targets;
                    } else if (typeof node.targets === "string" && node.targets.trim()) {
                        stored = JSON.parse(node.targets);
                    }
                } catch (error) {
                    stored = [];
                }
                if (!Array.isArray(stored)) {
                    stored = [];
                }

                const seen = {};
                targetList = stored.map(function (entry) {
                    if (!entry || typeof entry !== "object") {
                        return null;
                    }
                    const deviceId = String(entry.deviceId || "").trim();
                    const portIdx = Number(entry.portIdx);
                    if (!deviceId || !Number.isFinite(portIdx)) {
                        return null;
                    }
                    return {
                        deviceId: deviceId,
                        portIdx: portIdx,
                        clientId: String(entry.clientId || "").trim(),
                        name: String(entry.name || "").trim()
                    };
                }).filter(function (entry) {
                    if (!entry) {
                        return false;
                    }
                    const key = targetKey(entry);
                    if (seen[key]) {
                        return false;
                    }
                    seen[key] = true;
                    return true;
                });

                // Migrate a legacy single-target node into a one-entry list.
                if (targetList.length === 0) {
                    const legacyDeviceId = String(node.deviceId || "").trim();
                    const legacyPortRaw = String(node.portIdx === undefined || node.portIdx === null ? "" : node.portIdx).trim();
                    const legacyPort = Number(legacyPortRaw);
                    if (legacyDeviceId && legacyPortRaw !== "" && Number.isFinite(legacyPort)) {
                        targetList.push({
                            deviceId: legacyDeviceId,
                            portIdx: legacyPort,
                            clientId: String(node.clientLookupId || "").trim(),
                            name: String(node.deviceName || "").trim() || (legacyDeviceId + " p" + legacyPort)
                        });
                    }
                }

                persistTargets();
            }

            function setClientWaitOverlay(visible, message) {
                const $overlay = $("#node-input-clientWaitOverlay");
                const $message = $("#node-input-clientWaitMessage");
                if ($overlay.length === 0) {
                    return;
                }

                if (message) {
                    $message.text(message);
                }

                $overlay.css("display", visible === true ? "flex" : "none");
            }

            function withClientWait(message, work) {
                clientWaitOverlayDepth += 1;
                setClientWaitOverlay(true, message || "Loading client target...");

                return Promise.resolve()
                    .then(work)
                    .finally(function () {
                        clientWaitOverlayDepth = Math.max(0, clientWaitOverlayDepth - 1);
                        if (clientWaitOverlayDepth === 0) {
                            setClientWaitOverlay(false);
                        }
                    });
            }

            function getSelectedActionValue() {
                return String($action.val() || node.action || "msgPayload").trim().toLowerCase();
            }

            function getControlType() {
                return String($controlType.val() || node.controlType || "poe").trim() === "port" ? "port" : "poe";
            }

            function renderActionOptions() {
                // The action list depends on the chosen control domain. PoE keeps
                // its full set; port mode only enables/disables the switch port.
                const controlType = getControlType();
                const current = String($action.val() || node.action || "msgPayload").trim();
                const options = controlType === "port"
                    ? [
                        ["msgPayload", "Port controlled by msg.payload"],
                        ["enable", "Enable port"],
                        ["disable", "Disable port"]
                    ]
                    : [
                        ["msgPayload", "POE controlled by msg.payload"],
                        ["enable", "Enable PoE"],
                        ["disable", "Disable PoE"],
                        ["cycle", "Power Cycle"],
                        ["emitPowerConsumption", "Emit Power Consumption"]
                    ];

                $action.empty();
                options.forEach(function (option) {
                    $action.append($("<option></option>").val(option[0]).text(option[1]));
                });

                const hasCurrent = options.some(function (option) { return option[0] === current; });
                $action.val(hasCurrent ? current : "msgPayload");
            }

            function selectedActionObservesPower() {
                return ["emitpowerconsumption"].includes(getSelectedActionValue());
            }

            function selectedActionUsesPayloadControl() {
                return ["msgpayload", "payload", "poecontrolledbymsgpayload"].includes(getSelectedActionValue());
            }

            function setSelectAndSearchDisabled($select, disabled) {
                if (!$select || $select.length === 0) {
                    return;
                }
                $select.prop("disabled", disabled === true);
                const selectId = String($select.attr("id") || "").trim();
                if (!selectId) {
                    return;
                }
                $("#" + selectId + "-search").prop("disabled", disabled === true);
            }

            function setButtonDisabled($button, disabled) {
                if (!$button || $button.length === 0) {
                    return;
                }
                $button.prop("disabled", disabled === true);
                $button.attr("aria-disabled", disabled === true ? "true" : "false");
                $button.toggleClass("disabled", disabled === true);
            }

            function syncEditorInputsFlag() {
                // Persist dynamic pin visibility: stream-like power observation
                // modes do not accept input triggers.
                node.inputs = selectedActionObservesPower() ? 0 : 1;
            }

            function requestJson(url) {
                return new Promise(function (resolve, reject) {
                    $.getJSON(url, function (data) {
                        resolve(data);
                    }).fail(function (xhr) {
                        reject(xhr);
                    });
                });
            }

            function getConfigNodesByType(configType) {
                const configs = [];
                try {
                    if (RED && RED.nodes) {
                        // Read config nodes from the current editor workspace to
                        // auto-bind new POE nodes to an existing Network config.
                        if (typeof RED.nodes.eachConfig === "function") {
                            RED.nodes.eachConfig(function (cfg) {
                                if (cfg && cfg.type === configType) {
                                    configs.push(cfg);
                                }
                            });
                        } else if (typeof RED.nodes.eachNode === "function") {
                            RED.nodes.eachNode(function (cfg) {
                                if (cfg && cfg.type === configType) {
                                    configs.push(cfg);
                                }
                            });
                        }

                        if (configs.length === 0 && typeof RED.nodes.filterNodes === "function") {
                            try {
                                const filtered = RED.nodes.filterNodes({ type: configType });
                                if (Array.isArray(filtered)) {
                                    filtered.forEach(function (cfg) {
                                        configs.push(cfg);
                                    });
                                }
                            } catch (error) {
                            }
                        }
                    }
                } catch (error) {
                }
                return configs;
            }

            function ensureDefaultServerSelection() {
                // Only fill the connection automatically when the field is empty.
                const currentValue = String($server.val() || node.server || "").trim();
                if (currentValue !== "" && currentValue !== "_ADD_") {
                    return;
                }

                const configs = getConfigNodesByType("unifi-network-config");
                if (!Array.isArray(configs) || configs.length === 0) {
                    return;
                }

                const firstConfigId = String(configs[0].id || "").trim();
                if (!firstConfigId) {
                    return;
                }

                $server.val(firstConfigId);
            }

            function getSelectedServerId() {
                return String($server.val() || "").trim();
            }

            function makeSelectSearchable($select, placeholder) {
                if (!$select || $select.length === 0) {
                    return;
                }
                const selectId = String($select.attr("id") || "").trim();
                if (!selectId) {
                    return;
                }

                const searchId = selectId + "-search";
                $select.off(".unifiSearchable");
                $select.removeData("unifi-searchable");
                $select.removeData("unifi-options-count");
                $select.show();

                if ($select.is("select[multiple]")) {
                    return;
                }

                const $existingSearchInput = $("#" + searchId);
                if ($existingSearchInput.length > 0) {
                    try {
                        if ($existingSearchInput.data("ui-autocomplete")) {
                            $existingSearchInput.autocomplete("destroy");
                        }
                    } catch (error) {
                    }
                    $existingSearchInput.off(".unifiSearchable");
                    $existingSearchInput.remove();
                }

                const $searchInput = $("<input>")
                    .attr("id", searchId)
                    .attr("type", "search")
                    .attr("autocomplete", "off")
                    .attr("placeholder", String(placeholder || "Search"))
                    .addClass("red-ui-input")
                    .css({
                        width: $select.css("width") || "100%",
                        marginBottom: "6px"
                    });
                $select.before($searchInput);
                $select.hide();

                const options = $select.find("option").map(function () {
                    const $option = $(this);
                    const optionValue = String($option.val() || "").trim();
                    const optionText = String($option.text() || "").trim();
                    return {
                        value: optionValue,
                        text: optionText,
                        isOffline: $option.attr("data-offline") === "true",
                        isPlaceholder: optionValue === "",
                        searchable: [
                            optionText,
                            String($option.attr("data-device-name") || "").trim(),
                            String($option.attr("data-client-name") || "").trim(),
                            optionValue
                        ].filter(Boolean).join(" ").toLowerCase()
                    };
                }).get();

                function findOptionByValue(value) {
                    return options.find(function (option) {
                        return String(option.value) === String(value || "").trim();
                    });
                }

                function syncInputFromSelect() {
                    const selectedValue = String($select.val() || "").trim();
                    const selected = findOptionByValue(selectedValue);
                    if (selected && !selected.isPlaceholder) {
                        $searchInput.val(selected.text);
                    } else {
                        $searchInput.val("");
                    }
                }

                function setSelectedValue(value, triggerChange) {
                    const selected = findOptionByValue(value);
                    if (selected) {
                        $select.val(selected.value);
                    } else {
                        $select.val("");
                    }
                    syncInputFromSelect();
                    if (triggerChange) {
                        $select.trigger("change");
                    }
                }

                let filterOnKeyUpOnly = false;
                $searchInput.autocomplete({
                    minLength: 0,
                    source: function (request, response) {
                        const term = filterOnKeyUpOnly
                            ? String(request && request.term || "").trim().toLowerCase()
                            : "";
                        const items = options
                            .filter(function (option) {
                                if (option.isPlaceholder) {
                                    return false;
                                }
                                if (!term) {
                                    return true;
                                }
                                return option.searchable.indexOf(term) !== -1;
                            })
                            .map(function (option) {
                                return {
                                    label: option.text,
                                    value: option.text,
                                    optionValue: option.value,
                                    offline: option.isOffline
                                };
                            });

                        if (items.length === 0) {
                            response([{
                                label: "No results",
                                value: "",
                                optionValue: "",
                                noSelection: true
                            }]);
                            return;
                        }

                        response(items);
                    },
                    select: function (event, ui) {
                        if (ui.item && ui.item.noSelection) {
                            event.preventDefault();
                            return false;
                        }
                        if (ui.item) {
                            // Mark this as an explicit user selection from the list.
                            $select.data("unifi-user-selection", true);
                            setSelectedValue(ui.item.optionValue, true);
                        }
                        return true;
                    },
                    change: function (event, ui) {
                        if (ui.item) {
                            return;
                        }
                        const typed = String($searchInput.val() || "").trim().toLowerCase();
                        if (!typed) {
                            setSelectedValue("", true);
                            return;
                        }

                        const exactMatch = options.find(function (option) {
                            if (option.isPlaceholder) {
                                return false;
                            }
                            return option.text.toLowerCase() === typed || option.value.toLowerCase() === typed;
                        });

                        if (exactMatch) {
                            setSelectedValue(exactMatch.value, true);
                        } else {
                            syncInputFromSelect();
                        }
                    }
                });

                const autocompleteInstance = $searchInput.autocomplete("instance");
                if (autocompleteInstance) {
                    autocompleteInstance._renderItem = function (ul, item) {
                        const $entry = $("<li>");
                        const $content = $("<div>").text(item.label);
                        if (item.offline) {
                            $content.addClass("unifi-ultimate-offline-option");
                        }
                        return $entry.append($content).appendTo(ul);
                    };
                }

                $searchInput.on("keyup.unifiSearchable", function () {
                    filterOnKeyUpOnly = true;
                    $(this).autocomplete("search", $(this).val());
                });
                $searchInput.on("mouseup.unifiSearchable", function () {
                    const $input = $(this);
                    filterOnKeyUpOnly = false;
                    setTimeout(function () {
                        $input.autocomplete("search", "");
                    }, 0);
                });

                syncInputFromSelect();
                $searchInput.prop("disabled", false);
                $select.data("unifi-searchable", true);
                $select.data("unifi-options-count", options.length);
            }

            function getSelectedDeviceName() {
                const $selected = $deviceId.find("option:selected");
                return String($selected.data("deviceName") || "").trim();
            }

            function getSelectedClientName() {
                const $selected = $clientLookupId.find("option:selected");
                return String($selected.data("clientName") || "").trim();
            }

            function getSelectionMode() {
                const mode = String($selectionMode.val() || node.selectionMode || "switchPort").trim();
                return mode === "client" ? "client" : "switchPort";
            }

            function refreshSelectionModeUi() {
                syncProgressiveRows();
                updateDerivedTargetFieldsState();
            }

            function bindLazyClientLookupLoad() {
                function triggerLazyLoad() {
                    if (getSelectionMode() !== "client" || clientTargetsLoading) {
                        return;
                    }
                    withClientWait("Loading client targets...", function () {
                        return loadClients({ showLoading: false });
                    });
                }

                $clientLookupId
                    .off(".unifiLazyClientLoad")
                    .on("focus.unifiLazyClientLoad mousedown.unifiLazyClientLoad", triggerLazyLoad);

                $("#node-input-clientLookupId-search")
                    .off(".unifiLazyClientLoad")
                    .on("focus.unifiLazyClientLoad mousedown.unifiLazyClientLoad", triggerLazyLoad);
            }

            function updateDerivedTargetFieldsState() {
                const isClientMode = getSelectionMode() === "client";
                const disableDerived = isClientMode && (clientTargetsLoading || !clientTargetsPopulated);
                setSelectAndSearchDisabled($deviceId, disableDerived);
                setSelectAndSearchDisabled($portIdx, disableDerived);
                setButtonDisabled($refreshDevices, disableDerived);
            }

            function refreshSummary() {
                const deviceName = getSelectedDeviceName();
                const clientName = getSelectedClientName();
                const mode = getSelectionMode();
                const actionLabel = String($action.find("option:selected").text() || "POE controlled by msg.payload").trim();
                const portLabel = String($portIdx.val() || "").trim();
                const powerObserveMode = selectedActionObservesPower();

                let summary = "Choose a switch and a port.";
                let detail = "This node sends a port action request to UniFi Network.";

                if (deviceName) {
                    summary = actionLabel + " on " + deviceName + " (port " + (portLabel || "?") + ").";
                    detail = "Any incoming message triggers the configured action.";
                }
                if (mode === "client") {
                    summary = "Choose a client target.";
                    detail = "Selecting a client auto-fills switch and port from the attached uplink.";
                    if (clientName) {
                        summary = actionLabel + " on " + clientName + " (derived switch/port).";
                    }
                }

                if (powerObserveMode) {
                    const targetLabel = mode === "client"
                        ? (clientName ? (clientName + " (derived switch/port)") : "selected client target")
                        : (deviceName ? (deviceName + " (port " + (portLabel || "?") + ")") : "selected switch port");

                    summary = "Emit power consumption for " + targetLabel + ".";
                    detail = "After deploy/restart, polling starts automatically using the global interval set in Unifi Network Config.";
                }

                if (selectedActionUsesPayloadControl()) {
                    detail = "Send msg.payload=true to enable PoE, or msg.payload=false to disable PoE.";
                }
                syncProgressiveRows();
            }

            function refreshActionUi() {
                syncEditorInputsFlag();
            }

            function syncNameFromSelection() {
                const targetName = getSelectionMode() === "client"
                    ? getSelectedClientName()
                    : getSelectedDeviceName();
                if (!targetName) {
                    return;
                }

                const value = "POE " + targetName;
                $name.val(value);
            }

            function rememberSelectedTargetName() {
                const targetName = getSelectionMode() === "client"
                    ? getSelectedClientName()
                    : getSelectedDeviceName();
                if (!targetName) {
                    return;
                }

                $deviceName.val(targetName);
            }

            function renderDevices(items) {
                const currentValue = String($deviceId.val() || node.deviceId || "").trim();
                suspendChangeHandling = true;
                try {
                    $deviceId.empty();
                    $deviceId.append($("<option></option>").val("").text("Choose a switch"));

                    (items || []).forEach(function (item) {
                        const stateSuffix = item.state ? " [" + item.state + "]" : "";
                        $deviceId.append(
                            $("<option></option>")
                                .val(item.id)
                                .text((item.name || item.id) + stateSuffix)
                                .attr("data-device-name", item.name || item.id)
                        );
                    });

                    if (currentValue && $deviceId.find("option[value='" + currentValue + "']").length > 0) {
                        $deviceId.val(currentValue);
                    } else {
                        $deviceId.val("");
                    }
                } finally {
                    suspendChangeHandling = false;
                }

                makeSelectSearchable($deviceId, "Search switches");
                rememberSelectedTargetName();
                refreshSummary();
            }

            function renderPorts(ports) {
                const currentValue = String($portIdx.val() || node.portIdx || "").trim();
                suspendChangeHandling = true;
                try {
                    $portIdx.empty();

                    (ports || []).forEach(function (port) {
                        const idx = String(port.idx);
                        const poe = port.poeEnabled ? " PoE:" + port.poeEnabled : "";
                        const powerValue = Number(port.poePowerW);
                        const roundedPower = Number.isFinite(powerValue)
                            ? Math.round(powerValue * 1000) / 1000
                            : NaN;
                        const power = Number.isFinite(powerValue)
                            ? " Pwr:" + String(roundedPower) + "W"
                            : "";
                        const state = port.state ? " [" + port.state + "]" : "";
                        const clients = Array.isArray(port.connectedClientNames)
                            ? port.connectedClientNames.filter(Boolean)
                            : [];
                        const clientSuffix = clients.length > 0
                            ? " -> " + clients.join(", ")
                            : "";
                        $portIdx.append(
                            $("<option></option>")
                                .val(idx)
                                .text((port.name || ("Port " + idx)) + state + poe + power + clientSuffix)
                        );
                    });

                    if (currentValue && $portIdx.find("option[value='" + currentValue + "']").length > 0) {
                        $portIdx.val(currentValue);
                    } else if (ports && ports.length > 0) {
                        $portIdx.val(String(ports[0].idx));
                    } else {
                        $portIdx.append($("<option></option>").val(currentValue || "1").text("Port " + (currentValue || "1")));
                        $portIdx.val(currentValue || "1");
                    }
                } finally {
                    suspendChangeHandling = false;
                }

                refreshSummary();
            }

            function renderClients(items) {
                const currentValue = String($clientLookupId.val() || node.clientLookupId || "").trim();
                let renderedTargets = 0;
                suspendChangeHandling = true;
                try {
                    $clientLookupId.empty();
                    $clientLookupId.append($("<option></option>").val("").text("Choose a client target"));

                    (items || []).forEach(function (item) {
                        const isOffline = item.offline === true
                            || item.isOnline === false
                            || item.online === false
                            || String(item.state || "").toLowerCase() === "offline";
                        const stateSuffix = isOffline
                            ? ""
                            : (item.state ? " [" + item.state + "]" : "");
                        const attachment = item.attachment && typeof item.attachment === "object" ? item.attachment : {};
                        const attachedDeviceName = String(attachment.deviceName || "Switch").trim();
                        const attachedPortIdx = String(attachment.portIdx !== undefined ? attachment.portIdx : "").trim();
                        const attachedDeviceId = String(attachment.deviceId || "").trim();
                        if (!attachedDeviceId || attachedPortIdx === "") {
                            return;
                        }
                        const attachmentSuffix = " -> " + attachedDeviceName + " p" + attachedPortIdx;
                        const $option = $("<option></option>")
                            .val(item.id)
                            .text((item.name || item.id) + stateSuffix + attachmentSuffix)
                            .attr("data-client-name", item.name || item.id)
                            .attr("data-attached-device-id", attachedDeviceId)
                            .attr("data-attached-port-idx", attachedPortIdx)
                            .attr("data-attached-device-name", attachedDeviceName)
                            .attr("data-offline", isOffline ? "true" : "false");
                        if (isOffline) {
                            $option.css("color", "#94a3b8");
                        }
                        $clientLookupId.append($option);
                        renderedTargets += 1;
                    });

                    if (currentValue && $clientLookupId.find("option[value='" + currentValue + "']").length > 0) {
                        $clientLookupId.val(currentValue);
                    } else {
                        $clientLookupId.val("");
                    }
                } finally {
                    suspendChangeHandling = false;
                }

                makeSelectSearchable($clientLookupId, "Search clients");
                bindLazyClientLookupLoad();
                clientTargetsLoading = false;
                clientTargetsPopulated = renderedTargets > 0;
                clientsLoadedForServerId = getSelectedServerId();
                updateDerivedTargetFieldsState();
                rememberSelectedTargetName();
                refreshSummary();
            }

            function renderEmptyClientSelection() {
                // Open with an empty Client picker: restoring a saved client would
                // trigger a pointless switch/port resolution on every open. The
                // configured targets already live in the list, and the picker is
                // only used to add new ones.
                suspendChangeHandling = true;
                try {
                    $clientLookupId.empty();
                    $clientLookupId.append($("<option></option>").val("").text("Choose a client target"));
                    $clientLookupId.val("");
                } finally {
                    suspendChangeHandling = false;
                }

                clientTargetsLoading = false;
                clientTargetsPopulated = false;
                makeSelectSearchable($clientLookupId, "Search clients");
                bindLazyClientLookupLoad();
                updateDerivedTargetFieldsState();
                refreshSummary();
            }

            function renderClientsLoading() {
                clientTargetsLoading = true;
                clientTargetsPopulated = false;
                suspendChangeHandling = true;
                try {
                    $clientLookupId.empty();
                    $clientLookupId.append(
                        $("<option></option>")
                            .val("")
                            .text("Loading clients, please wait...")
                    );
                    $clientLookupId.val("");
                } finally {
                    suspendChangeHandling = false;
                }

                makeSelectSearchable($clientLookupId, "Loading clients, please wait...");
                $("#node-input-clientLookupId-search")
                    .val("Loading clients, please wait...")
                    .prop("disabled", true);
                bindLazyClientLookupLoad();
                updateDerivedTargetFieldsState();
            }

            function hasOptionValue($select, value) {
                const normalizedTarget = String(value || "").trim();
                if (!normalizedTarget) {
                    return false;
                }

                return $select.find("option").toArray().some(function (option) {
                    return String(option.value || "").trim() === normalizedTarget;
                });
            }

            function loadPorts() {
                const serverId = String($server.val() || "").trim();
                const deviceId = String($deviceId.val() || "").trim();
                if (!serverId || !deviceId || serverId === "_ADD_") {
                    renderPorts([]);
                    return Promise.resolve();
                }

                return requestJson(
                    "unifiNetwork/device-ports?serverId=" + encodeURIComponent(serverId) +
                    "&deviceId=" + encodeURIComponent(deviceId)
                ).then(function (data) {
                    renderPorts(Array.isArray(data) ? data : []);
                }).catch(function (xhr) {
                    renderPorts([]);
                    const errorText = xhr && xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : "Unable to load ports";
                    RED.notify(errorText, "error");
                });
            }

            function loadDevices() {
                const serverId = String($server.val() || "").trim();
                if (!serverId || serverId === "_ADD_") {
                    renderDevices([]);
                    renderPorts([]);
                    $refreshDevices.find("i").removeClass("fa-spin");
                    return Promise.resolve();
                }

                // Ports depend on the selected switch, so refresh both lists in
                // one flow whenever the connection changes.
                $refreshDevices.find("i").addClass("fa-spin");
                return requestJson("unifiNetwork/devices?serverId=" + encodeURIComponent(serverId) + "&deviceType=device")
                    .then(function (data) {
                        renderDevices(Array.isArray(data) ? data : []);
                        return loadPorts();
                    })
                    .catch(function (xhr) {
                        renderDevices([]);
                        renderPorts([]);
                        const errorText = xhr && xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : "Unable to load devices";
                        RED.notify(errorText, "error");
                    })
                    .finally(function () {
                        $refreshDevices.find("i").removeClass("fa-spin");
                    });
            }

            function loadClients(options) {
                const settings = options && typeof options === "object" ? options : {};
                const forceReload = settings.force === true;
                const showLoadingState = settings.showLoading !== false;
                const serverId = getSelectedServerId();
                if (!serverId || serverId === "_ADD_") {
                    clientsLoadedForServerId = "";
                    renderClients([]);
                    $refreshClients.find("i").removeClass("fa-spin");
                    return Promise.resolve();
                }

                if (!forceReload
                    && !clientTargetsLoading
                    && clientTargetsPopulated
                    && clientsLoadedForServerId === serverId) {
                    return Promise.resolve();
                }

                if (clientsRequestPromise) {
                    return clientsRequestPromise;
                }

                $refreshClients.find("i").addClass("fa-spin");
                if (showLoadingState) {
                    renderClientsLoading();
                }

                clientsRequestPromise = requestJson("unifiNetwork/clients-with-attachment?serverId=" + encodeURIComponent(serverId))
                    .then(function (data) {
                        renderClients(Array.isArray(data) ? data : []);
                    })
                    .catch(function (xhr) {
                        clientsLoadedForServerId = "";
                        renderClients([]);
                        const errorText = xhr && xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : "Unable to load clients";
                        RED.notify(errorText, "error");
                    })
                    .finally(function () {
                        clientsRequestPromise = null;
                        $refreshClients.find("i").removeClass("fa-spin");
                    });
                return clientsRequestPromise;
            }

            function loadEditorData(options) {
                const settings = options && typeof options === "object" ? options : {};
                const shouldLoadClients = settings.loadClients === true;
                return loadDevices().then(function () {
                    if (!shouldLoadClients) {
                        return;
                    }
                    return loadClients({
                        force: settings.forceClients === true,
                        showLoading: settings.showClientsLoading !== false
                    });
                }).finally(function () {
                    refreshSummary();
                });
            }

            try {
                RED.sidebar.show("help");
            } catch (error) {
            }

            $server.on("change", function () {
                if (suspendChangeHandling || isInitializingEditor) {
                    return;
                }
                clientsLoadedForServerId = "";
                if (getSelectionMode() === "client") {
                    withClientWait("Loading client targets...", function () {
                        return loadEditorData({
                            loadClients: true,
                            forceClients: true
                        });
                    });
                } else {
                    loadEditorData({
                        loadClients: false,
                        forceClients: true
                    });
                }
            });

            $deviceId.on("change", function () {
                if (suspendChangeHandling) {
                    return;
                }
                rememberSelectedTargetName();
                const isUserSelection = $deviceId.data("unifi-user-selection") === true;
                $deviceId.removeData("unifi-user-selection");
                if (isUserSelection) {
                    syncNameFromSelection();
                }
                loadPorts();
            });

            $portIdx.on("change", refreshSummary);
            $controlType.on("change", function () {
                renderActionOptions();
                syncPowerActionAvailability();
                refreshActionUi();
                refreshSummary();
            });
            $action.on("change", function () {
                refreshActionUi();
                refreshSummary();
            });
            $selectionMode.on("change", function () {
                if (suspendChangeHandling) {
                    return;
                }
                refreshSelectionModeUi();
                rememberSelectedTargetName();
                if (getSelectionMode() === "client") {
                    // Only load the client dropdown so the user can pick one. The
                    // switch/port for the chosen client lives on the option's
                    // data-attached-* attributes, so there is nothing to resolve.
                    withClientWait("Loading client targets...", function () {
                        return loadClients({ showLoading: false });
                    });
                } else {
                    refreshSummary();
                }
            });
            $clientLookupId.on("change", function () {
                if (suspendChangeHandling) {
                    return;
                }
                rememberSelectedTargetName();
                const isUserSelection = $clientLookupId.data("unifi-user-selection") === true;
                $clientLookupId.removeData("unifi-user-selection");
                if (isUserSelection) {
                    syncNameFromSelection();
                }
                refreshSummary();
            });

            $refreshDevices.on("click", function (event) {
                event.preventDefault();
                loadDevices();
            });
            $refreshClients.on("click", function (event) {
                event.preventDefault();
                withClientWait("Loading client targets...", function () {
                    return loadClients({ force: true });
                });
            });
            $addTarget.on("click", function (event) {
                event.preventDefault();
                // The selected client option already carries its switch/port in its
                // data-attached-* attributes (read by getCurrentSelectionTarget),
                // so adding never needs a separate switch/port resolution.
                addCurrentTarget();
            });

            ensureDefaultServerSelection();
            $selectionMode.val(String(node.selectionMode || "switchPort"));
            $controlType.val(String(node.controlType || "poe"));
            if (!$controlType.val()) {
                $controlType.val("poe");
            }
            renderActionOptions();
            makeSelectSearchable($deviceId, "Search switches");
            renderEmptyClientSelection();
            initTargetList();
            renderTargetList();
            syncPowerActionAvailability();
            refreshSelectionModeUi();
            refreshActionUi();
            $refreshDevices.find("i").addClass("fa-spin");
            loadEditorData({
                loadClients: false
            }).finally(function () {
                isInitializingEditor = false;
            });
        }
    });
</script>

<script type="text/html" data-help-name="unifi-network-control-poe">
    <p><a href="https://youtube.com/playlist?list=PL9Yh1bjbLAYrWKtMlopN0swuQXbdJ8MFJ&si=4MmW1nNTCLrJtEHv" target="_blank" rel="noopener noreferrer"><img src="resources/node-red-contrib-unifi-ultimate/logos/youtube-icon.svg" alt="YouTube" width="24" height="18" style="vertical-align:text-bottom; margin-right:6px;">Youtube Tutorials</a></p>

    <p>Controls PoE, or enables/disables the whole switch port, on a list of UniFi switch ports. Build the list by picking a target (a switch port, or a client whose uplink switch/port is resolved automatically) and clicking <b>Add to list</b>. When triggered, the configured action runs on every target in the list and a single summary message is emitted.</p>

    <h3>Configuration</h3>
    <p><b>Connection</b> selects the shared UniFi Network config node.</p>
    <p><b>Search by</b> chooses how to pick a target before adding it: select <code>Switch + Port</code> directly, or select a <code>Client</code> and let the node fill in the connected switch and port.</p>
    <p><b>Switch</b> selects the adopted UniFi switch. The selector is searchable.</p>
    <p><b>Client</b> lists clients with known switch and port mapping. The selector is searchable and shows the user-defined client name (e.g. "iPhone di Massimo") when set, otherwise the device hostname.</p>
    <p><b>Port</b> selects the physical port index. Port labels include connected clients or downstream UniFi devices when available.</p>
    <p><b>Add to list</b> appends the currently selected target (switch port or resolved client) to the <b>Clients</b> list. Duplicates (same switch and port) are ignored. Remove a target with the ✕ button next to it.</p>
    <p><b>Control</b> chooses what is controlled on each target port:</p>
    <ul>
        <li><code>PoE</code> — controls Power-over-Ethernet on the port (the attached device keeps its link but loses/gains power).</li>
        <li><code>Enable/Disable port</code> — administratively enables or disables the whole switch port, exactly like the UniFi <em>Port State</em> toggle. Disabling cuts <em>all</em> traffic and PoE on that port, disconnecting whatever is attached. Implemented through the UniFi port override <code>forward</code> field (verified against the controller): Disable sets <code>forward=disabled</code> and preserves the rest of the port config. Enable acts only on a disabled port (an already-enabled port is left untouched): it sets <code>forward=all</code> and, if the port had been disabled from the UniFi UI (which also blocks VLANs and clears the native network), it restores <code>tagged_vlan_mgmt=auto</code>, <code>port_security_enabled=false</code> and the site default native network.</li>
    </ul>
    <p><b>Action</b> is applied to <em>every</em> target in the list, and its choices depend on <b>Control</b>:</p>
    <ul>
        <li><b>PoE:</b> <code>POE controlled by msg.payload</code> (<code>true</code> enables, <code>false</code> disables), <code>Enable PoE</code>, <code>Disable PoE</code>, <code>Power Cycle</code>, and <code>Emit Power Consumption</code> (single target only).</li>
        <li><b>Enable/Disable port:</b> <code>Port controlled by msg.payload</code> (<code>true</code> enables the port, <code>false</code> disables it), <code>Enable port</code>, and <code>Disable port</code>.</li>
    </ul>
    <p><b>Power poll interval</b> for emit action is configured globally in <code>Unifi Network Config</code>. This node does not run its own timer.</p>
    <p>Request timeout is handled automatically by the node.</p>
    <p><b>Name</b> is the node name shown in the editor and is updated only when you manually select a different switch or client target.</p>

    <h3>Input</h3>
    <ul>
        <li>When using <code>Emit Power Consumption</code>, the input pin is hidden and listening starts automatically after deploy/restart.</li>
        <li>Any incoming message triggers the configured action.</li>
        <li>When action is <code>POE controlled by msg.payload</code>, the node reads <code>msg.payload</code>: <code>true</code> enables PoE, <code>false</code> disables PoE.</li>
        <li>For all other actions, input message properties are ignored.</li>
    </ul>

    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>Output 1 — result</dt>
        <dd>A single summary message emitted after the action has been attempted on every target in the list. Per-target failures are reported inside the summary, not on the error output.</dd>
        <dt class="optional">msg.payload.action</dt>
        <dd>The action applied to the list (e.g. <code>DISABLE_POE</code>).</dd>
        <dt class="optional">msg.payload.total / ok / failed</dt>
        <dd>Counts of targets processed, succeeded, and failed.</dd>
        <dt class="optional">msg.payload.results</dt>
        <dd>Array with one entry per target: <code>name</code>, <code>deviceId</code>, <code>portIdx</code>, <code>action</code>, <code>ok</code>, and either <code>portName</code>/<code>portPowerW</code>/<code>powerConsumptionSwitchTotal</code> on success or <code>error</code> on failure.</dd>
        <dt class="optional">msg.topic</dt>
        <dd>Node name from the editor.</dd>
        <dt class="optional">msg.eventName</dt>
        <dd>Action that produced the message.</dd>
        <dt class="optional">msg.details.unifiNetworkPoe</dt>
        <dd>Summary metadata (action and total/ok/failed counts).</dd>
    </dl>
    <p>The <code>Emit Power Consumption</code> action (single target only) keeps its original per-port message shape, including <code>msg.payload.portPowerW</code>, <code>msg.payload.powerConsumptionSwitchTotal</code> and <code>msg.payload.powerChanged</code>.</p>
    <dl class="message-properties">
        <dt>Output 2 — error</dt>
        <dd>Emitted when the action fails (API error, timeout, or configuration problem). The node status also turns red. Errors are additionally forwarded to any connected <code>catch</code> node.</dd>
        <dt class="optional">msg.payload</dt>
        <dd><code>null</code></dd>
        <dt class="optional">msg.topic</dt>
        <dd>Node name from the editor.</dd>
        <dt class="optional">msg.error.message</dt>
        <dd>Human-readable error description.</dd>
    </dl>
    <p><b>Power fields (guaranteed vs optional)</b></p>

                <th style="text-align:left; border-bottom:1px solid #ddd; padding:4px 6px;">Notes</th>
            </tr>

                <td style="padding:4px 6px;"><code>msg.payload.portName</code></td>

            <tr>
                <td style="padding:4px 6px;"><code>msg.payload.portPowerW</code></td>
