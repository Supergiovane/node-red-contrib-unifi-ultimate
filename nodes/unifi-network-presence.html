<link rel="stylesheet" type="text/css"
    href="resources/node-red-contrib-unifi-ultimate/editor/unifi-ultimate-editor-common.css">


<script type="text/javascript">
    // Resolve the active "Watch by" mode for validators: prefer the live editor
    // value, fall back to the saved node value.
    function currentWatchByValue(self) {
        try {
            const live = $("#node-input-watchBy").val();
            if (live) {
                return String(live).trim();
            }
        } catch (error) {
            // jQuery/DOM not available in this context.
        }
        return (self && self.watchBy) ? String(self.watchBy).trim() : "presence";
    }

    RED.nodes.registerType("unifi-network-presence", {
        category: "Unifi Ultimate",
        color: "#CFE8FB",
        defaults: {
            name: { value: "" },
            server: { value: "", type: "unifi-network-config", required: true },
            watchBy: { value: "presence", required: true },
            clientId: {
                value: "",
                validate: function (v) {
                    const mode = currentWatchByValue(this);
                    return mode === "network" ? true : String(v || "").trim() !== "";
                }
            },
            deviceName: { value: "" },
            pollInterval: { value: 10, required: true, validate: RED.validators.number() },
            onlineHysteresis: { value: 15, required: true, validate: RED.validators.number() },
            offlineHysteresis: { value: 30, required: true, validate: RED.validators.number() },
            repeatInterval: { value: 0, required: false, validate: RED.validators.number() },
            networkId: {
                value: "",
                validate: function (v) {
                    const mode = currentWatchByValue(this);
                    return mode === "network" ? String(v || "").trim() !== "" : true;
                }
            },
            networkName: { value: "" },
            emitInitial: { value: false },
            joinConfirmPolls: { value: 1, validate: RED.validators.number() },
            leaveConfirmPolls: { value: 3, validate: RED.validators.number() }
        },
        inputs: 0,
        outputs: 2,
        icon: "unifi-u-logo-light-network.svg",
        paletteLabel: "Presence Detection",
        outputLabels: ["result", "error"],
        label: function () {
            if (this.name) {
                return this.name;
            }
            if (this.watchBy === "network" && this.networkName) {
                return this.networkName;
            }
            return "Presence Detection";
        },
        oneditsave: function () {
            const mode = String($("#node-input-watchBy").val() || "presence").trim();
            // Only the network mode accepts an input trigger.
            this.inputs = mode === "network" ? 1 : 0;
            if (mode === "network") {
                const $selected = $("#node-input-networkId option:selected");
                this.networkName = String($selected.attr("data-network-name") || "").trim();
                $("#node-input-networkName").val(this.networkName);
            }
        },
        oneditprepare: function () {
            const node = this;
            const $name = $("#node-input-name");
            const $server = $("#node-input-server");
            const $watchBy = $("#node-input-watchBy");
            const $clientId = $("#node-input-clientId");
            const $deviceName = $("#node-input-deviceName");
            const $refresh = $("#node-input-refreshClients");
            const $clientRow = $clientId.closest(".form-row");
            const $advancedRow = $("#node-row-advanced");
            // Network-mode controls.
            const $networkId = $("#node-input-networkId");
            const $refreshNetworks = $("#node-input-refreshNetworks");
            const $watchByRow = $("#node-row-watchBy");
            const $networkRow = $("#node-row-networkId");
            const $networkStatus = $("#unifi-presence-network-status");
            let suspendChangeHandling = false;
            let loadedNetworksServerId = "";

            $watchBy.val(this.watchBy || "presence");

            function currentMode() {
                return String($watchBy.val() || "presence").trim();
            }

            function hasSelection($field) {
                const value = String($field.val() || "").trim();
                return value !== "" && value !== "_ADD_";
            }

            function syncProgressiveRows() {
                const hasServer = hasSelection($server);
                const isNetwork = currentMode() === "network";
                const hasTarget = isNetwork ? hasSelection($networkId) : hasSelection($clientId);

                $watchByRow.toggle(hasServer);
                $clientRow.toggle(hasServer && !isNetwork);
                $networkRow.toggle(hasServer && isNetwork);
                $advancedRow.toggle(hasServer && hasTarget);
                // Tuning rows depend on the active mode.
                $("#node-presence-tuning").toggle(!isNetwork);
                $("#node-network-tuning").toggle(isNetwork);
            }

            function renderNetworks(items) {
                const currentValue = String($networkId.val() || node.networkId || "").trim();
                suspendChangeHandling = true;
                try {
                    $networkId.empty();
                    $networkId.append($("<option></option>").val("").text("Choose a network"));
                    (items || []).forEach(function (item) {
                        const id = String(item.id || "").trim();
                        if (!id) {
                            return;
                        }
                        const name = String(item.name || id).trim();
                        const tags = [];
                        if (item.isGuest) { tags.push("guest"); }
                        if (item.vlan) { tags.push("VLAN " + item.vlan); }
                        if (item.enabled === false) { tags.push("disabled"); }
                        const suffix = tags.length > 0 ? " [" + tags.join(", ") + "]" : "";
                        $networkId.append(
                            $("<option></option>").val(id).text(name + suffix).attr("data-network-name", name)
                        );
                    });
                    $networkId.val(currentValue && $networkId.find("option[value='" + currentValue + "']").length > 0 ? currentValue : "");
                } finally {
                    suspendChangeHandling = false;
                }
                syncProgressiveRows();
            }

            function loadNetworks(force) {
                const serverId = String($server.val() || "").trim();
                if (!serverId || serverId === "_ADD_") {
                    renderNetworks([]);
                    $networkStatus.text("");
                    return Promise.resolve();
                }
                if (!force && serverId === loadedNetworksServerId) {
                    return Promise.resolve();
                }
                $networkStatus.text("Loading networks...");
                $refreshNetworks.find("i").addClass("fa-spin");
                loadedNetworksServerId = serverId;
                return requestJson("unifiNetwork/networks?serverId=" + encodeURIComponent(serverId))
                    .then(function (networks) {
                        renderNetworks(Array.isArray(networks) ? networks : []);
                        $networkStatus.text("");
                    })
                    .catch(function (xhr) {
                        renderNetworks([]);
                        $networkStatus.text(xhr && xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : "Unable to load networks.");
                    })
                    .then(function () {
                        $refreshNetworks.find("i").removeClass("fa-spin");
                    });
            }

            function requestJson(url) {
                return new Promise(function (resolve, reject) {
                    $.getJSON(url, function (data) {
                        resolve(data);
                    }).fail(function (xhr) {
                        reject(xhr);
                    });
                });
            }

            function getConfigNodesByType(configType) {
                const configs = [];
                try {
                    if (RED && RED.nodes) {
                        // Read config nodes directly from the editor workspace so
                        // a new Presence node can default to an existing connection.
                        if (typeof RED.nodes.eachConfig === "function") {
                            RED.nodes.eachConfig(function (cfg) {
                                if (cfg && cfg.type === configType) {
                                    configs.push(cfg);
                                }
                            });
                        } else if (typeof RED.nodes.eachNode === "function") {
                            RED.nodes.eachNode(function (cfg) {
                                if (cfg && cfg.type === configType) {
                                    configs.push(cfg);
                                }
                            });
                        }

                        if (configs.length === 0 && typeof RED.nodes.filterNodes === "function") {
                            try {
                                const filtered = RED.nodes.filterNodes({ type: configType });
                                if (Array.isArray(filtered)) {
                                    filtered.forEach(function (cfg) {
                                        configs.push(cfg);
                                    });
                                }
                            } catch (error) {
                            }
                        }
                    }
                } catch (error) {
                }
                return configs;
            }

            function ensureDefaultServerSelection() {
                // Only auto-select a config for new/empty nodes.
                const currentValue = String($server.val() || node.server || "").trim();
                if (currentValue !== "" && currentValue !== "_ADD_") {
                    return;
                }

                const configs = getConfigNodesByType("unifi-network-config");
                if (!Array.isArray(configs) || configs.length === 0) {
                    return;
                }

                const firstConfigId = String(configs[0].id || "").trim();
                if (!firstConfigId) {
                    return;
                }

                $server.val(firstConfigId);
            }

            function makeSelectSearchable($select, placeholder) {
                if (!$select || $select.length === 0) {
                    return;
                }
                const selectId = String($select.attr("id") || "").trim();
                if (!selectId) {
                    return;
                }

                const searchId = selectId + "-search";
                $select.off(".unifiSearchable");
                $select.removeData("unifi-searchable");
                $select.removeData("unifi-options-count");
                $select.show();

                if ($select.is("select[multiple]")) {
                    return;
                }

                const $existingSearchInput = $("#" + searchId);
                if ($existingSearchInput.length > 0) {
                    try {
                        if ($existingSearchInput.data("ui-autocomplete")) {
                            $existingSearchInput.autocomplete("destroy");
                        }
                    } catch (error) {
                    }
                    $existingSearchInput.off(".unifiSearchable");
                    $existingSearchInput.remove();
                }

                const $searchInput = $("<input>")
                    .attr("id", searchId)
                    .attr("type", "search")
                    .attr("autocomplete", "off")
                    .attr("placeholder", String(placeholder || "Search"))
                    .addClass("red-ui-input")
                    .css({
                        width: $select.css("width") || "100%",
                        marginBottom: "6px"
                    });
                $select.before($searchInput);
                $select.hide();

                const options = $select.find("option").map(function () {
                    const $option = $(this);
                    const optionValue = String($option.val() || "").trim();
                    const optionText = String($option.text() || "").trim();
                    return {
                        value: optionValue,
                        text: optionText,
                        isOffline: $option.attr("data-offline") === "true",
                        isPlaceholder: optionValue === "",
                        searchable: [
                            optionText,
                            String($option.attr("data-device-name") || "").trim(),
                            String($option.attr("data-client-name") || "").trim(),
                            optionValue
                        ].filter(Boolean).join(" ").toLowerCase()
                    };
                }).get();

                function findOptionByValue(value) {
                    return options.find(function (option) {
                        return String(option.value) === String(value || "").trim();
                    });
                }

                function syncInputFromSelect() {
                    const selectedValue = String($select.val() || "").trim();
                    const selected = findOptionByValue(selectedValue);
                    if (selected && !selected.isPlaceholder) {
                        $searchInput.val(selected.text);
                    } else {
                        $searchInput.val("");
                    }
                }

                function setSelectedValue(value, triggerChange) {
                    const selected = findOptionByValue(value);
                    if (selected) {
                        $select.val(selected.value);
                    } else {
                        $select.val("");
                    }
                    syncInputFromSelect();
                    if (triggerChange) {
                        $select.trigger("change");
                    }
                }

                let filterOnKeyUpOnly = false;
                $searchInput.autocomplete({
                    minLength: 0,
                    source: function (request, response) {
                        const term = filterOnKeyUpOnly
                            ? String(request && request.term || "").trim().toLowerCase()
                            : "";
                        const items = options
                            .filter(function (option) {
                                if (option.isPlaceholder) {
                                    return false;
                                }
                                if (!term) {
                                    return true;
                                }
                                return option.searchable.indexOf(term) !== -1;
                            })
                            .map(function (option) {
                                return {
                                    label: option.text,
                                    value: option.text,
                                    optionValue: option.value,
                                    offline: option.isOffline
                                };
                            });

                        if (items.length === 0) {
                            response([{
                                label: "No results",
                                value: "",
                                optionValue: "",
                                noSelection: true
                            }]);
                            return;
                        }

                        response(items);
                    },
                    select: function (event, ui) {
                        if (ui.item && ui.item.noSelection) {
                            event.preventDefault();
                            return false;
                        }
                        if (ui.item) {
                            $select.data("unifi-user-selection", true);
                            setSelectedValue(ui.item.optionValue, true);
                        }
                        return true;
                    },
                    change: function (event, ui) {
                        if (ui.item) {
                            return;
                        }
                        const typed = String($searchInput.val() || "").trim().toLowerCase();
                        if (!typed) {
                            setSelectedValue("", true);
                            return;
                        }

                        const exactMatch = options.find(function (option) {
                            if (option.isPlaceholder) {
                                return false;
                            }
                            return option.text.toLowerCase() === typed || option.value.toLowerCase() === typed;
                        });

                        if (exactMatch) {
                            setSelectedValue(exactMatch.value, true);
                        } else {
                            syncInputFromSelect();
                        }
                    }
                });

                const autocompleteInstance = $searchInput.autocomplete("instance");
                if (autocompleteInstance) {
                    autocompleteInstance._renderItem = function (ul, item) {
                        const $entry = $("<li>");
                        const $content = $("<div>").text(item.label);
                        if (item.offline) {
                            $content.addClass("unifi-ultimate-offline-option");
                        }
                        return $entry.append($content).appendTo(ul);
                    };
                }

                $searchInput.on("keyup.unifiSearchable", function () {
                    filterOnKeyUpOnly = true;
                    $(this).autocomplete("search", $(this).val());
                });
                $searchInput.on("mouseup.unifiSearchable", function () {
                    const $input = $(this);
                    filterOnKeyUpOnly = false;
                    setTimeout(function () {
                        $input.autocomplete("search", "");
                    }, 0);
                });

                syncInputFromSelect();
                $searchInput.prop("disabled", false);
                $select.data("unifi-searchable", true);
                $select.data("unifi-options-count", options.length);
            }

            function getSelectedClientName() {
                const $selected = $clientId.find("option:selected");
                return String($selected.data("clientName") || "").trim();
            }

            function refreshSummary() {
                const serverId = String($server.val() || "").trim();
                const clientName = getSelectedClientName();
                let summary = "Choose a connection to begin.";
                let detail = "Select one client. The node emits true when connected and false when disconnected.";

                if (serverId && serverId !== "_ADD_") {
                    summary = "Choose the client to monitor.";
                    detail = "Presence checks are scheduled by the shared Network config node using UniFi Network data.";
                }

                if (clientName) {
                    summary = "Monitoring presence for " + clientName + ".";
                    detail = "Connect and disconnect hysteresis reduce false flapping on unstable links.";
                }
                syncProgressiveRows();
            }

            function syncNameFromSelection() {
                const clientName = getSelectedClientName();
                if (!clientName) {
                    return;
                }

                $name.val(clientName);
            }

            function rememberSelectedClientName() {
                const clientName = getSelectedClientName();
                if (!clientName) {
                    return;
                }

                $deviceName.val(clientName);
            }

            function renderClients(items) {
                const currentValue = String($clientId.val() || node.clientId || "").trim();
                suspendChangeHandling = true;
                try {
                    $clientId.empty();
                    $clientId.append($("<option></option>").val("").text("Choose a client"));

                    (items || []).forEach(function (item) {
                        const isOffline = item.offline === true
                            || item.isOnline === false
                            || item.online === false
                            || String(item.state || "").toLowerCase() === "offline";
                        const stateSuffix = isOffline
                            ? " (offline)"
                            : (item.state ? " [" + item.state + "]" : "");
                        const $option = $("<option></option>")
                            .val(item.id)
                            .text((item.name || item.id) + stateSuffix)
                            .attr("data-client-name", item.name || item.id)
                            .attr("data-offline", isOffline ? "true" : "false");
                        if (isOffline) {
                            $option.css("color", "#94a3b8");
                        }
                        $clientId.append($option);
                    });

                    if (currentValue && $clientId.find("option[value='" + currentValue + "']").length > 0) {
                        $clientId.val(currentValue);
                    } else {
                        $clientId.val("");
                    }
                } finally {
                    suspendChangeHandling = false;
                }

                makeSelectSearchable($clientId, "Search clients");
                rememberSelectedClientName();
                refreshSummary();
            }

            function renderClientsLoading() {
                suspendChangeHandling = true;
                try {
                    $clientId.empty();
                    $clientId.append(
                        $("<option></option>")
                            .val("")
                            .text("Loading clients, please wait...")
                    );
                    $clientId.val("");
                } finally {
                    suspendChangeHandling = false;
                }

                makeSelectSearchable($clientId, "Loading clients, please wait...");
                $("#node-input-clientId-search")
                    .val("Loading clients, please wait...")
                    .prop("disabled", true);
            }

            function loadClients() {
                const serverId = String($server.val() || "").trim();
                if (!serverId || serverId === "_ADD_") {
                    renderClients([]);
                    $refresh.find("i").removeClass("fa-spin");
                    return Promise.resolve();
                }

                // Client availability depends on the selected controller, so
                // reload the list whenever the connection changes.
                $refresh.find("i").addClass("fa-spin");
                renderClientsLoading();
                return requestJson("unifiNetwork/devices?serverId=" + encodeURIComponent(serverId) + "&deviceType=client")
                    .then(function (data) {
                        renderClients(Array.isArray(data) ? data : []);
                    })
                    .catch(function (xhr) {
                        renderClients([]);
                        const errorText = xhr && xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : "Unable to load clients";
                        RED.notify(errorText, "error");
                    })
                    .finally(function () {
                        $refresh.find("i").removeClass("fa-spin");
                    });
            }

            try {
                RED.sidebar.show("help");
            } catch (error) {
            }

            $server.on("change", function () {
                if (suspendChangeHandling) {
                    return;
                }
                if (currentMode() === "network") {
                    loadNetworks(false);
                } else {
                    loadClients();
                }
            });

            $clientId.on("change", function () {
                if (suspendChangeHandling) {
                    return;
                }
                rememberSelectedClientName();
                const isUserSelection = $clientId.data("unifi-user-selection") === true;
                $clientId.removeData("unifi-user-selection");
                if (isUserSelection) {
                    syncNameFromSelection();
                }
                refreshSummary();
            });

            $refresh.on("click", function (event) {
                event.preventDefault();
                loadClients();
            });

            $watchBy.on("change", function () {
                syncProgressiveRows();
                if (currentMode() === "network") {
                    loadNetworks(false);
                } else {
                    loadClients();
                }
            });

            $networkId.on("change", function () {
                if (suspendChangeHandling) {
                    return;
                }
                syncProgressiveRows();
            });

            $refreshNetworks.on("click", function (event) {
                event.preventDefault();
                loadNetworks(true);
            });

            ensureDefaultServerSelection();
            makeSelectSearchable($clientId, "Search clients");
            refreshSummary();
            syncProgressiveRows();
            if (currentMode() === "network") {
                loadNetworks(false);
            } else {
                $refresh.find("i").addClass("fa-spin");
                loadClients();
            }
        }
    });
</script>

<script type="text/html" data-template-name="unifi-network-presence">
    <div class="form-row unifi-ultimate-product-logo-row">
        <img class="unifi-ultimate-product-logo" src="resources/node-red-contrib-unifi-ultimate/logos/unifi-network-black.svg" alt="UniFi Network logo" onerror="this.closest('.unifi-ultimate-product-logo-row').style.display='none';">

        <a class="unifi-ultimate-youtube-link" href="https://youtube.com/playlist?list=PL9Yh1bjbLAYrWKtMlopN0swuQXbdJ8MFJ&si=4MmW1nNTCLrJtEHv" target="_blank" rel="noopener noreferrer">
            <img src="resources/node-red-contrib-unifi-ultimate/logos/youtube-icon.svg" alt="YouTube" width="24" height="18">
            <span>Youtube Tutorials</span>

            <option value="presence">Single client (presence)</option>
            <option value="network">Network (join/leave)</option>

            </div>
            <div class="form-row">
                <label for="node-input-offlineHysteresis"><i class="fa fa-hourglass-half"></i> Hysteresis (s)</label>
                <input type="text" id="node-input-offlineHysteresis" placeholder="30">
            </div>
            <div class="form-row">
                <label for="node-input-repeatInterval"><i class="fa fa-clock-o"></i> Resend (s)</label>
                <input type="text" id="node-input-repeatInterval" placeholder="0 = off">
            </div>
        </div>
        <div id="node-network-tuning" style="display:none;">
            <div class="form-row">
                <label for="node-input-emitInitial" style="width:auto;"><i class="fa fa-bullhorn"></i> Emit current clients on start</label>
                <input type="checkbox" id="node-input-emitInitial" style="display:inline-block; width:auto; vertical-align:top;">
            </div>
        </div>
        <input type="hidden" id="node-input-deviceName">
        <input type="hidden" id="node-input-networkName">
        <input type="hidden" id="node-input-joinConfirmPolls">
        <input type="hidden" id="node-input-leaveConfirmPolls">
    </div>
</script>

<script type="text/html" data-help-name="unifi-network-presence">
    <p><a href="https://youtube.com/playlist?list=PL9Yh1bjbLAYrWKtMlopN0swuQXbdJ8MFJ&si=4MmW1nNTCLrJtEHv" target="_blank" rel="noopener noreferrer"><img src="resources/node-red-contrib-unifi-ultimate/logos/youtube-icon.svg" alt="YouTube" width="24" height="18" style="vertical-align:text-bottom; margin-right:6px;">Youtube Tutorials</a></p>

    <p>Watches UniFi Network clients. In <b>Single client (presence)</b> mode it tells you whether one selected client is connected (a boolean). In <b>Network (join/leave)</b> mode it watches a whole network/VLAN (for example <code>Guest</code>) and emits an event whenever any client joins or leaves it.</p>

    <h3>Configuration</h3>
    <p><b>Connection</b> selects the shared UniFi Network config node.</p>
    <p><b>Watch by</b> chooses the mode: <code>Single client (presence)</code> or <code>Network (join/leave)</code>.</p>

    <h4>Single client (presence)</h4>
    <p><b>Client</b> selects the client to track. The selector is searchable and opens with the complete list before filtering. Each entry shows the user-defined client name (e.g. "iPhone di Massimo") when set, otherwise the device hostname. Known-but-offline clients are included too and marked with an <code>(offline)</code> label, so you can pick a target even while it is disconnected.</p>
    <p><b>Connect Hysteresis (s)</b> delays the <code>true</code> output so brief reconnects do not flap. <b>Hysteresis (s)</b> delays the <code>false</code> output. <b>Resend (s)</b> optionally re-emits the last saved value on a fixed cadence (<code>0</code> = off); resent messages carry <code>msg.eventName = "repeat"</code>.</p>

    <h4>Network (join/leave)</h4>
    <p><b>Network</b> selects the L3 network / VLAN to watch. The list comes from the networks configured on your controller. This is the only required field — sensible defaults handle the rest.</p>
    <p><b>Emit current clients on start</b>, when enabled, emits a <code>joined</code> event for every client already on the network at deploy. Disabled (default) only reports later changes.</p>
    <p>The node automatically debounces events (a client must be seen for a couple of polls before <code>joined</code>/<code>left</code> fires) to absorb the transient flapping UniFi shows while it classifies a freshly connected client. Polling cadence and debounce use built-in defaults.</p>
    <p><b>Note on timing:</b> a newly connected client can take up to about a minute to appear on its network in the UniFi data (especially guest networks), so a <code>joined</code> event may lag the physical connection. This is a controller-side limitation. Leaves are detected quickly.</p>

    <p>In <b>presence</b> mode, <b>Poll (s)</b> sets the check cadence. <b>Name</b> is the node name shown in the editor. Request timeout is handled automatically.</p>

    <h3>Input</h3>
    <ul>
        <li><b>Presence mode:</b> no input pin; checks run automatically at startup and on the configured cadence.</li>
        <li><b>Network mode:</b> any incoming message forces an immediate poll between intervals.</li>
    </ul>

    <h3>Outputs</h3>
    <p><b>Network mode</b> emits one message per client on Output 1 with <code>msg.eventName</code> = <code>joined</code>/<code>left</code>, the client name in <code>msg.deviceName</code>, the watched network in <code>msg.network</code>, and details (<code>mac</code>, <code>isGuest</code>, <code>isWired</code>, <code>ipAddress</code>, …) in <code>msg.payload</code>. Route joins and leaves apart with a <code>switch</code> node on <code>msg.eventName</code>. The fields below describe <b>presence mode</b>.</p>
    <dl class="message-properties">
        <dt>Output 1 — result</dt>
        <dd>Emitted when the debounced presence state changes.</dd>
        <dt class="optional">msg.payload</dt>
        <dd><code>true</code> when the client is present, <code>false</code> when absent.</dd>
        <dt class="optional">msg.present</dt>
        <dd>Same boolean presence value as <code>msg.payload</code>.</dd>
        <dt class="optional">msg.topic</dt>
        <dd>Node name from the editor.</dd>
        <dt class="optional">msg.deviceName</dt>
        <dd>Remembered name of the selected client.</dd>
        <dt class="optional">msg.eventName</dt>
        <dd>Reason or source that produced the message.</dd>
        <dt class="optional">msg.details.client</dt>
        <dd>Last known client object when available.</dd>
        <dt class="optional">msg.details.unifiNetworkPresence</dt>
        <dd>Metadata including site/client ids and hysteresis settings.</dd>
    </dl>
    <dl class="message-properties">
        <dt>Output 2 — error</dt>
        <dd>Emitted when a presence poll fails (API error, timeout, or configuration problem). The node status also turns red. Errors are additionally forwarded to any connected <code>catch</code> node.</dd>
        <dt class="optional">msg.payload</dt>
        <dd><code>null</code></dd>
        <dt class="optional">msg.topic</dt>
        <dd>Node name from the editor.</dd>
        <dt class="optional">msg.error.message</dt>
        <dd>Human-readable error description.</dd>
    </dl>
    <p>Example output (pin 1):</p>
    <pre><code>{
  "topic": "iPhone Massimo Presence",
  "deviceName": "iPhone-Massimo",
  "eventName": "connected",
  "payload": true,
  "present": true,
  "details": {
    "unifiNetworkPresence": {
      "nodeType": "presence",
      "source": "poll",
      "reason": "connected"
    }
  }
}</code></pre>
    <p>Example output (pin 2 — error):</p>
    <pre><code>{
  "topic": "iPhone Massimo Presence",
  "payload": null,
  "error": { "message": "Presence polling failed" }
}</code></pre>
